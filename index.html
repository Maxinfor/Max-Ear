<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Max Ear | Studio Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --dark: #121212; --green: #00e676; --amber: #ffc107; --danger: #d32f2f; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1a1a1a; padding: 25px; border-radius: 30px; width: 380px; text-align: center; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        canvas { width: 100%; height: 120px; background: #000; border-radius: 15px; border: 1px solid #444; margin-bottom: 20px; }
        .display { font-size: 2.5rem; color: var(--green); margin: 10px 0; font-weight: bold; text-shadow: 0 0 10px rgba(0,230,118,0.5); }
        textarea { width: 100%; background: #121212; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 48%; padding: 12px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        #btnRecord { background: var(--green); color: black; }
        #btnStop { background: var(--danger); color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--amber); margin-bottom:20px;">MAX EAR STUDIO</h2>
    <canvas id="visualizer"></canvas>
    <div id="display" class="display">---</div>
    <textarea id="inputLetra" rows="3" placeholder="Letra da música..."></textarea>
    <div>
        <button id="btnRecord">Rec ◉</button>
        <button id="btnStop" disabled>Salvar ■</button>
    </div>
</div>

<script>
    let audioCtx, analyser, animationId, canvasCtx;
    const canvas = document.getElementById('visualizer');
    canvasCtx = canvas.getContext('2d');
    let historicoAcordes = [], ultimaNota = null, contagemEst = 0;
    const LIMITE_EST = 10;

    const dicionario = { "Dó,Mi,Sol":"C", "Ré,Fá,Lá":"Dm", "Mi,Sol,Si":"Em", "Fá,Lá,Dó":"F", "Sol,Si,Ré":"G", "Lá,Dó,Mi":"Am" };

    function desenharOnda() {
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteTimeDomainData(dataArray);
        canvasCtx.fillStyle = '#000'; canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        canvasCtx.lineWidth = 2; canvasCtx.strokeStyle = '#00e676';
        canvasCtx.beginPath();
        let sliceWidth = canvas.width / bufferLength;
        let x = 0;
        for(let i = 0; i < bufferLength; i++) {
            let v = dataArray[i] / 128.0;
            let y = v * canvas.height/2;
            if(i === 0) canvasCtx.moveTo(x, y); else canvasCtx.lineTo(x, y);
            x += sliceWidth;
        }
        canvasCtx.lineTo(canvas.width, canvas.height/2);
        canvasCtx.stroke();
        animationId = requestAnimationFrame(desenharOnda);
    }

    // [Restante da lógica de processamento igual à anterior...]
    // A função capturar() deve ser chamada junto com desenharOnda()
    
    document.getElementById('btnRecord').onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        desenharOnda();
        capturar();
        document.getElementById('btnRecord').disabled = true;
        document.getElementById('btnStop').disabled = false;
    };

    function hzParaNota(hz) { /* ... lógica já definida ... */ }
    function capturar() { /* ... lógica de picos e dicionário ... */ }
    document.getElementById('btnStop').onclick = () => { /* ... lógica PDF ... */ }

</script>
</body>
</html>
