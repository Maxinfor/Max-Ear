<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ear Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { touch-action: manipulation; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; height: 100%; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        canvas { width: 100%; height: 100px; background: #000; border: 1px solid #333; border-radius: 8px; }
        
        .display-area { background: #151515; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .display { font-size: 1.8rem; color: #00e676; font-weight: bold; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        button { padding: 10px 5px; border-radius: 6px; border: none; font-weight: 600; background: #222; color: #ccc; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        button.active { background: #00e676; color: #000; }
        
        .footer-controls { display: flex; gap: 8px; margin-top: auto; }
        #btnRecord { flex: 2; background: #00e676; color: #000; padding: 12px; }
        #btnStop { flex: 1; background: #333; color: #fff; padding: 12px; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; font-size: 0.9rem; letter-spacing: 1px; color: #666;">MAX EAR STUDIO</div>
    <canvas id="visualizer"></canvas>
    
    <div class="display-area">
        <div id="display" class="display">PRONTO</div>
    </div>

    <div class="btn-grid">
        <button class="mode-btn" onclick="setModo('AFINADOR', this)">AFINADOR</button>
        <button class="mode-btn" onclick="setModo('ACORDES', this)">ACORDES</button>
        <button class="mode-btn" onclick="setModo('MELODIA', this)">MELODIA</button>
    </div>

    <div class="footer-controls">
        <button id="btnRecord">INICIAR</button>
        <button id="btnStop" disabled>EXPORTAR</button>
    </div>
</div>
