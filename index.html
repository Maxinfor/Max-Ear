<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ear Studio - Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --neon: #00e676; --bg: #0a0a0a; --glass: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--glass); backdrop-filter: blur(10px); padding: 20px; border-radius: 25px; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        canvas { width: 100%; height: 80px; background: #000; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--neon); }
        .display { font-size: 1.8rem; color: var(--neon); margin: 10px 0; font-weight: bold; min-height: 40px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: none; background: #222; color: #fff; box-sizing: border-box; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        button { padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #btnRecord { background: var(--neon); color: #000; }
        #btnStop { background: #d32f2f; color: #fff; }
        .mode-btn { background: #444; color: #fff; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin: 0 0 15px 0; letter-spacing: 2px;">MAX EAR STUDIO</h2>
    <canvas id="visualizer"></canvas>
    <div id="display" class="display">PRONTO</div>
    <input type="text" id="inputCampo" placeholder="Campo Harmônico (ex: Dó,Ré,Mi)">
    <div class="btn-grid">
        <button class="mode-btn" onclick="setModo('AFINADOR')">AFINADOR</button>
        <button class="mode-btn" onclick="setModo('IDENTIFICADOR')">ACORDES</button>
    </div>
    <button id="btnRecord" style="width: 100%;">INICIAR ◉</button>
    <button id="btnStop" style="width: 100%; margin-top: 10px;" disabled>PARAR ■</button>
</div>

<script>
    let audioCtx, analyser, modoAtual = 'IDENTIFICADOR', historicoEventos = [], bufferNotas = [];
    const canvas = document.getElementById('visualizer'), canvasCtx = canvas.getContext('2d');
    const dicionario = { "Dó,Mi,Sol":"C", "Ré,Fá,Lá":"Dm", "Mi,Sol,Si":"Em", "Fá,Lá,Dó":"F", "Sol,Si,Ré":"G", "Lá,Dó,Mi":"Am" };

    function hzParaNota(hz) {
        const notas = ["Dó", "Dó#", "Ré", "Ré#", "Mi", "Fá", "Fá#", "Sol", "Sol#", "Lá", "Lá#", "Si"];
        return notas[Math.round(12 * (Math.log(hz / 440) / Math.log(2)) + 57) % 12];
    }

    function setModo(m) { modoAtual = m; document.getElementById('display').innerText = m; }

    async function capturar() {
        const data = new Float32Array(2048);
        analyser.getFloatFrequencyData(data);
        let max = -Infinity, freq = 0;
        for(let i=0; i<data.length; i++) if(data[i] > max) { max = data[i]; freq = i * (44100/2048); }
        
        if(max > -40) {
            let nota = hzParaNota(freq);
            bufferNotas.push(nota);
            if(bufferNotas.length > 20) {
                let maisFrequente = bufferNotas.sort((a,b) => bufferNotas.filter(v => v===a).length - bufferNotas.filter(v => v===b).length).pop();
                bufferNotas = [];
                
                if(modoAtual === 'AFINADOR') {
                    let campo = document.getElementById('inputCampo').value.split(',').map(n => n.trim());
                    let ok = campo.includes(maisFrequente);
                    document.getElementById('display').innerText = (ok ? "✓ " : "X ") + maisFrequente;
                    document.getElementById('display').style.color = ok ? "#00e676" : "#d32f2f";
                } else {
                    let acorde = dicionario[maisFrequente] || "Acorde...";
                    document.getElementById('display').innerText = acorde;
                }
                historicoEventos.push({tipo: modoAtual, valor: maisFrequente, time: new Date().toLocaleTimeString()});
            }
        }
        if(!document.getElementById('btnStop').disabled) requestAnimationFrame(capturar);
    }

    document.getElementById('btnRecord').onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new AudioContext(); analyser = audioCtx.createAnalyser();
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        document.getElementById('btnRecord').disabled = true; document.getElementById('btnStop').disabled = false;
        capturar();
    };

    document.getElementById('btnStop').onclick = () => {
        location.reload(); // Simples reset para o demo
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        historicoEventos.forEach((h, i) => doc.text(`${i+1}. ${h.tipo}: ${h.valor}`, 20, 20 + (i*10)));
        doc.save("Relatorio_MaxEar.pdf");
    };
</script>
</body>
</html>
