<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ear Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; }
        canvas { width: 100%; height: 100px; background: #000; border: 1px solid #333; border-radius: 8px; margin-bottom: 10px; }
        .display { background: #151515; padding: 20px; text-align: center; border: 1px solid #00e676; border-radius: 8px; font-size: 1.5rem; color: #00e676; font-weight: bold; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        button { padding: 10px; border-radius: 6px; border: none; font-weight: 600; background: #222; color: #fff; }
        button.active { background: #00e676; color: #000; }
        .footer { display: flex; gap: 10px; margin-top: auto; }
        #btnRecord { flex: 2; background: #00e676; color: #000; }
        #btnStop { flex: 1; background: #d32f2f; color: #fff; }
    </style>
</head>
<body>

    <div style="text-align: center; font-size: 0.8rem; color: #666; margin-bottom: 5px;">MAX EAR STUDIO</div>
    <canvas id="visualizer"></canvas>
    <div id="display" class="display">PRONTO</div>
    
    <div class="grid">
        <button class="mode-btn" onclick="setModo('AFINADOR', this)">AFINADOR</button>
        <button class="mode-btn" onclick="setModo('ACORDES', this)">ACORDES</button>
        <button class="mode-btn" onclick="setModo('MELODIA', this)">MELODIA</button>
    </div>

    <div class="footer">
        <button id="btnRecord">INICIAR</button>
        <button id="btnStop" disabled>PDF</button>
    </div>

<script>
    let audioCtx, analyser, modo = 'AFINADOR', historico = [];
    const canvas = document.getElementById('visualizer'), ctx = canvas.getContext('2d');
    const notas = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    function setModo(m, btn) {
        modo = m;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('display').innerText = m;
    }

    async function iniciar() {
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        audioCtx = new AudioContext(); analyser = audioCtx.createAnalyser();
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        document.getElementById('btnRecord').disabled = true;
        document.getElementById('btnStop').disabled = false;
        loop();
    }

    function loop() {
        let data = new Float32Array(2048);
        analyser.getFloatTimeDomainData(data);
        
        // Desenho
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = '#00e676'; ctx.beginPath();
        for(let i=0; i<data.length; i++) ctx.lineTo(i/data.length*canvas.width, (data[i]*0.5+0.5)*canvas.height);
        ctx.stroke();

        // Detecção simples
        let count = 0;
        for (let i = 0; i < data.length - 1; i++) if (data[i] < 0 && data[i + 1] >= 0) count++;
        let hz = (count * 44100) / data.length;
        
        if (hz > 50 && hz < 2000) {
            let n = Math.round(12 * (Math.log(hz / 440) / Math.log(2)) + 69);
            let nota = notas[n % 12];
            document.getElementById('display').innerText = nota;
            historico.push({tipo: modo, valor: nota, time: new Date().toLocaleTimeString()});
        }
        requestAnimationFrame(loop);
    }

    document.getElementById('btnRecord').onclick = iniciar;
    document.getElementById('btnStop').onclick = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Relatorio de Atividade", 10, 10);
        historico.forEach((h, i) => { if(i < 30) doc.text(`${h.tipo}: ${h.valor} - ${h.time}`, 10, 20+(i*10)); });
        doc.save("Relatorio.pdf");
        location.reload();
    };
</script>
</body>
</html>
