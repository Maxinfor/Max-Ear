<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ear AI Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #00e676; 
            --bg: #0a0a0a;
            --card-bg: #141414;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: -apple-system, 'Inter', sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            padding: 10px;
        }
        .container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        #visualizer { 
            width: 100%; 
            height: 100px; 
            background: #000; 
            border: 1px solid #222; 
            border-radius: 12px; 
            display: block;
        }
        .display-area { 
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            border: 1px solid #333;
            transition: all 0.3s ease;
            min-height: 100px;
        }
        .display-area.recording { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,230,118,0.1); }
        .display-area.idle { border-color: #444; }
        .mode-label { 
            font-size: 0.7rem; 
            color: #666; 
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .display { 
            font-size: 3.5rem; 
            color: var(--accent); 
            font-weight: 700; 
            font-family: 'Courier New', monospace;
            line-height: 1.2;
            min-height: 60px;
        }
        .display-sub {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
            min-height: 20px;
        }
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 8px; 
        }
        .grid button { 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            font-weight: 600; 
            background: #1a1a1a; 
            color: #888;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }
        .grid button:active { transform: scale(0.95); }
        .grid button.active { 
            background: var(--accent); 
            color: #000; 
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0,230,118,0.2);
        }
        .footer { 
            display: flex; 
            gap: 10px; 
            padding: 10px 0;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        #btnRecord { 
            flex: 2; 
            background: var(--accent); 
            color: #000; 
            font-weight: bold; 
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
        }
        #btnRecord:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #btnExport { 
            flex: 1; 
            background: #2a2a2a; 
            color: #fff; 
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }
        #btnExport:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        #btnExport.active { 
            background: #d32f2f; 
            color: #fff;
        }
        .history {
            max-height: 60px;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 8px;
            background: #0a0a0a;
            border-radius: 8px;
            border: 1px solid #1a1a1a;
            min-height: 40px;
            align-items: center;
        }
        .history-item {
            background: #1a1a1a;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            color: #888;
            border: 1px solid #222;
        }
        .history-item.current { 
            color: var(--accent); 
            border-color: var(--accent);
            background: rgba(0,230,118,0.1);
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.recording { background: #ff4444; animation: blink 0.8s infinite; }
        .status-dot.idle { background: #444; }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <canvas id="visualizer"></canvas>
    <div class="display-area idle" id="displayArea">
        <div class="mode-label" id="label">
            <span class="status-dot idle" id="statusDot"></span>
            Aguardando...
        </div>
        <div id="display" class="display">---</div>
        <div id="displaySub" class="display-sub">Toque uma nota para começar</div>
    </div>
    <div class="grid">
        <button onclick="setModo('AFINADOR', this)" class="active">🎯 Afinador</button>
        <button onclick="setModo('ACORDES', this)">🎹 Acordes</button>
        <button onclick="setModo('MELODIA', this)">🎵 Melodia</button>
    </div>
    <div id="historyContainer" class="history">
        <span style="color:#444; font-size:0.7rem; width:100%; text-align:center;">Histórico de notas aparecerá aqui</span>
    </div>
</div>

<div class="footer">
    <button id="btnRecord">🎤 Iniciar</button>
    <button id="btnExport" disabled>📄 PDF</button>
</div>

<script>
    // Configurações
    const NOTAS = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    let audioContext = null;
    let analyser = null;
    let modo = 'AFINADOR';
    let historico = [];
    let isRecording = false;
    let animationId = null;
    let canvas, ctx;
    let mediaStream = null;

    // Inicializar canvas
    function initCanvas() {
        canvas = document.getElementById('visualizer');
        ctx = canvas.getContext('2d');
        resizeCanvas();
    }

    function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        drawEmptyCanvas();
    }

    function drawEmptyCanvas() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 1;
        ctx.beginPath();
        const midY = canvas.height / 2;
        ctx.moveTo(0, midY);
        ctx.lineTo(canvas.width, midY);
        ctx.stroke();
    }

    // Desenhar visualizador
    function drawVisualizer(dataArray) {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const width = canvas.width;
        const height = canvas.height;
        const midY = height / 2;
        
        // Linha central
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, midY);
        ctx.lineTo(width, midY);
        ctx.stroke();
        
        // Forma de onda
        ctx.strokeStyle = '#00e676';
        ctx.lineWidth = 2;
        ctx.beginPath();
        
        const step = Math.max(1, Math.floor(dataArray.length / width));
        const amp = height / 2 * 0.8;
        
        for (let i = 0; i < width; i++) {
            const index = Math.floor(i * step);
            const value = dataArray[index] || 0;
            const x = i;
            const y = midY + (value * amp);
            
            if (i === 0) {
                ctx.moveTo(x, y);
            } else {
                ctx.lineTo(x, y);
            }
        }
        ctx.stroke();
        
        // Efeito de glow
        ctx.shadowColor = 'rgba(0,230,118,0.2)';
        ctx.shadowBlur = 10;
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

    // Detectar pitch usando autocorrelação
    function autoCorrelate(buffer, sampleRate) {
        const size = buffer.length;
        let rms = 0;
        
        for (let i = 0; i < size; i++) {
            rms += buffer[i] * buffer[i];
        }
        rms = Math.sqrt(rms / size);
        
        if (rms < 0.01) return -1;
        
        // Encontrar o primeiro pico
        let maxIndex = -1;
        let maxValue = -1;
        
        for (let i = 0; i < size / 2; i++) {
            let corr = 0;
            for (let j = 0; j < size - i; j++) {
                corr += buffer[j] * buffer[j + i];
            }
            if (corr > maxValue) {
                maxValue = corr;
                maxIndex = i;
            }
        }
        
        if (maxIndex > 0) {
            const frequency = sampleRate / maxIndex;
            return frequency;
        }
        return -1;
    }

    // Converter frequência para nota
    function freqToNote(freq) {
        if (freq < 50 || freq > 2000) return null;
        
        const a4 = 440;
        const c0 = a4 * Math.pow(2, -69/12);
        const noteNumber = Math.round(12 * Math.log2(freq / c0));
        const noteIndex = ((noteNumber % 12) + 12) % 12;
        return NOTAS[noteIndex];
    }

    // Detectar acorde
    function detectChord(note) {
        const acordes = {
            'C': ['C', 'E', 'G'],
            'C#': ['C#', 'F', 'G#'],
            'D': ['D', 'F#', 'A'],
            'D#': ['D#', 'G', 'A#'],
            'E': ['E', 'G#', 'B'],
            'F': ['F', 'A', 'C'],
            'F#': ['F#', 'A#', 'C#'],
            'G': ['G', 'B', 'D'],
            'G#': ['G#', 'C', 'D#'],
            'A': ['A', 'C#', 'E'],
            'A#': ['A#', 'D', 'F'],
            'B': ['B', 'D#', 'F#']
        };
        return acordes[note] || null;
    }

    // Processar áudio
    function processAudio() {
        if (!analyser || !isRecording) return;
        
        const bufferLength = analyser.fftSize;
        const dataArray = new Float32Array(bufferLength);
        analyser.getFloatTimeDomainData(dataArray);
        
        // Desenhar visualizador
        drawVisualizer(dataArray);
        
        // Detectar pitch
        const freq = autoCorrelate(dataArray, audioContext.sampleRate);
        
        if (freq > 50 && freq < 2000) {
            const nota = freqToNote(freq);
            const display = document.getElementById('display');
            const sub = document.getElementById('displaySub');
            
            if (nota) {
                let displayText = nota;
                let subText = `${Math.round(freq)}Hz`;
                
                if (modo === 'ACORDES') {
                    const acorde = detectChord(nota);
                    if (acorde) {
                        displayText = acorde.join(' - ');
                        subText = `Acorde ${nota} maior`;
                    }
                } else if (modo === 'MELODIA') {
                    displayText = nota;
                    subText = `Nota: ${nota}`;
                }
                
                display.textContent = displayText;
                display.style.color = '#00e676';
                sub.textContent = subText;
                
                // Adicionar ao histórico
                historico.push({
                    nota: nota,
                    modo: modo,
                    frequencia: Math.round(freq),
                    tempo: new Date().toLocaleTimeString()
                });
                updateHistory();
                
                // Atualizar status
                document.getElementById('label').innerHTML = `
                    <span class="status-dot recording"></span>
                    ${modo} - ${nota}
                `;
            }
        } else {
            // Sem som
            document.getElementById('display').textContent = '---';
            document.getElementById('display').style.color = '#555';
            document.getElementById('displaySub').textContent = 'Aguardando sinal...';
        }
        
        animationId = requestAnimationFrame(processAudio);
    }

    // Atualizar histórico
    function updateHistory() {
        const container = document.getElementById('historyContainer');
        container.innerHTML = '';
        
        const recent = historico.slice(-12);
        if (recent.length === 0) {
            container.innerHTML = '<span style="color:#444; font-size:0.7rem; width:100%; text-align:center;">Histórico de notas aparecerá aqui</span>';
            return;
        }
        
        recent.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            if (index === recent.length - 1) div.classList.add('current');
            div.textContent = `${item.nota} ${item.tempo}`;
            container.appendChild(div);
        });
    }

    // Iniciar gravação
    async function iniciar() {
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    echoCancellation: false,
                    noiseSuppression: false,
                    autoGainControl: false
                } 
            });
            
            audioContext = new (window.AudioContext || window.webkitAudioContext)({
                sampleRate: 44100
            });
            
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            analyser.smoothingTimeConstant = 0.8;
            
            const source = audioContext.createMediaStreamSource(mediaStream);
            source.connect(analyser);
            
            isRecording = true;
            document.getElementById('btnRecord').disabled = true;
            document.getElementById('btnRecord').textContent = '🔴 Gravando...';
            document.getElementById('btnExport').disabled = false;
            document.getElementById('btnExport').classList.add('active');
            document.getElementById('displayArea').className = 'display-area recording';
            document.getElementById('label').innerHTML = `
                <span class="status-dot recording"></span>
                Escutando...
            `;
            document.getElementById('display').textContent = '---';
            document.getElementById('displaySub').textContent = 'Processando áudio...';
            
            processAudio();
            
        } catch (err) {
            alert('Erro ao acessar microfone: ' + err.message);
            console.error(err);
        }
    }

    // Parar gravação
    function parar() {
        isRecording = false;
        
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
        
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
            mediaStream = null;
        }
        
        if (audioContext && audioContext.state !== 'closed') {
            audioContext.close().catch(console.error);
            audioContext = null;
        }
        
        document.getElementById('btnRecord').disabled = false;
        document.getElementById('btnRecord').textContent = '🎤 Iniciar';
        document.getElementById('btnExport').classList.remove('active');
        document.getElementById('displayArea').className = 'display-area idle';
        document.getElementById('label').innerHTML = `
            <span class="status-dot idle"></span>
            Parado
        `;
        drawEmptyCanvas();
    }

    // Exportar PDF
    function exportPDF() {
        if (historico.length === 0) {
            alert('Nenhuma nota detectada para exportar.');
            return;
        }
        
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(18);
            doc.setTextColor(0, 230, 118);
            doc.text('Max Ear AI Pro', 20, 25);
            
            doc.setFontSize(12);
            doc.setTextColor(255, 255, 255);
            doc.text(`Modo: ${modo}`, 20, 40);
            doc.text(`Data: ${new Date().toLocaleString()}`, 20, 48);
            doc.text(`Total de notas: ${historico.length}`, 20, 56);
            
            let y = 75;
            doc.setFontSize(10);
            historico.forEach((item, index) => {
                if (y > 270) {
                    doc.addPage();
                    y = 20;
                }
                doc.text(`${index+1}. ${item.nota} - ${item.frequencia}Hz - ${item.tempo}`, 20, y);
                y += 7;
            });
            
            doc.save('max-ear-report.pdf');
            
        } catch (err) {
            alert('Erro ao gerar PDF: ' + err.message);
        }
    }

    // Mudar modo
    function setModo(m, btn) {
        if (isRecording) {
            // Se estiver gravando, mostra aviso
            if (!confirm(`Mudar para ${m}? O histórico será limpo.`)) {
                return;
            }
        }
        
        modo = m;
        document.querySelectorAll('.grid button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        historico = [];
        updateHistory();
        
        document.getElementById('display').textContent = '---';
        document.getElementById('displaySub').textContent = `Modo: ${m}`;
        document.getElementById('label').innerHTML = `
            <span class="status-dot idle"></span>
            ${m}
        `;
    }

    // Event listeners
    window.addEventListener('load', () => {
        initCanvas();
        drawEmptyCanvas();
        
        document.getElementById('btnRecord').addEventListener('click', () => {
            if (isRecording) {
                parar();
            } else {
                iniciar();
            }
        });
        
        document.getElementById('btnExport').addEventListener('click', exportPDF);
        window.addEventListener('resize', resizeCanvas);
    });

    // Limpar ao fechar
    window.addEventListener('beforeunload', () => {
        if (isRecording) {
            parar();
        }
    });
</script>
</body>
</html>
