<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Max Ear Studio Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/cwilso/PitchDetect/js/pitchdetect.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #161616; padding: 20px; border-radius: 20px; width: 95%; max-width: 400px; text-align: center; border: 1px solid #333; }
        canvas { width: 100%; height: 100px; background: #000; border-radius: 10px; margin-bottom: 10px; border: 1px solid #00e676; }
        .display { font-size: 2rem; color: #00e676; margin: 10px 0; font-weight: bold; height: 50px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        button { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .active { background: #00e676 !important; color: #000; }
    </style>
</head>
<body>

<div class="container">
    <canvas id="visualizer"></canvas>
    <div id="display" class="display">---</div>
    <div class="btn-grid">
        <button class="mode-btn" onclick="setModo('AFINADOR', this)">AFINADOR</button>
        <button class="mode-btn" onclick="setModo('ACORDES', this)">ACORDES</button>
        <button class="mode-btn" onclick="setModo('MELODIA', this)">MELODIA</button>
    </div>
    <button id="btnRecord" style="width:100%; background:#00e676; padding:15px;">INICIAR</button>
    <button id="btnStop" style="width:100%; margin-top:5px; background:#d32f2f; padding:15px;" disabled>PARAR/PDF</button>
</div>

<script>
    let audioCtx, analyser, modoAtual = 'AFINADOR', historico = [], buffer = [];
    let rafID = null;
    const canvas = document.getElementById('visualizer'), ctx = canvas.getContext('2d');
    const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    function setModo(m, btn) {
        modoAtual = m;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        buffer = [];
    }

    // Função de detecção de Pitch (Autocorrelação)
    function updatePitch() {
        let array = new Float32Array(1024);
        analyser.getFloatTimeDomainData(array);
        let pitch = autoCorrelate(array, audioCtx.sampleRate);
        
        if (pitch !== -1) {
            let note = Math.round( 12 * (Math.log(pitch / 440) / Math.log(2)) + 69 );
            let notaNome = noteStrings[note % 12];
            
            if(modoAtual === 'MELODIA') {
                document.getElementById('display').innerText = notaNome;
                historico.push({tipo:'Melodia', valor: notaNome});
            } else if(modoAtual === 'ACORDES') {
                buffer.push(notaNome);
                if(buffer.length > 20) {
                    let unique = [...new Set(buffer)];
                    document.getElementById('display').innerText = "Acordes detectados...";
                    // Aqui sua lógica de dicionário de acordes
                    buffer = [];
                }
            }
        }
        rafID = requestAnimationFrame(updatePitch);
    }

    document.getElementById('btnRecord').onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        audioCtx = new AudioContext(); analyser = audioCtx.createAnalyser();
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        updatePitch();
        document.getElementById('btnStop').disabled = false;
    };

    document.getElementById('btnStop').onclick = () => {
        cancelAnimationFrame(rafID);
        location.reload();
    };
</script>
</body>
</html>
