<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ear AI Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #00e676; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .container { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        canvas { width: 100%; height: 150px; background: #000; border: 1px solid #222; border-radius: 12px; }
        .display-area { background: #111; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid var(--accent); }
        .mode-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .display { font-size: 2.5rem; color: var(--accent); font-weight: 800; margin-top: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        button { padding: 12px; border-radius: 8px; border: none; font-weight: 600; background: #222; color: #fff; }
        button.active { background: var(--accent); color: #000; }
        .footer { display: flex; gap: 10px; padding: 15px; background: #111; border-top: 1px solid #333; }
        #btnRecord { flex: 2; background: var(--accent); color: #000; font-weight: bold; padding: 15px; }
        #btnStop { flex: 1; background: #d32f2f; color: #fff; padding: 15px; }
    </style>
</head>
<body>

<div class="container">
    <canvas id="visualizer"></canvas>
    <div class="display-area">
        <div class="mode-label" id="label">Aguardando...</div>
        <div id="display" class="display">---</div>
    </div>
    <div class="grid">
        <button onclick="setModo('AFINADOR', this)">AFINADOR</button>
        <button onclick="setModo('ACORDES', this)">ACORDES</button>
        <button onclick="setModo('MELODIA', this)">MELODIA</button>
    </div>
</div>

<div class="footer">
    <button id="btnRecord">INICIAR IA</button>
    <button id="btnStop" disabled>EXPORTAR PDF</button>
</div>

<script>
    let audioCtx, analyser, modo = 'AFINADOR', historico = [];
    
    // Configuração de Estúdio
    async function iniciar() {
        const stream = await navigator.mediaDevices.getUserMedia({audio: true});
        audioCtx = new AudioContext({sampleRate: 44100});
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 4096; // Maior resolução para detecção de acordes
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        
        document.getElementById('btnRecord').disabled = true;
        document.getElementById('btnStop').disabled = false;
        loop();
    }

    // Algoritmo de Autocorrelação (Padrão de afinadores profissionais)
    function autoCorrelate(buf, sampleRate) {
        let SIZE = buf.length;
        let rms = 0;
        for(let i=0; i<SIZE; i++) rms += buf[i]*buf[i];
        if(Math.sqrt(rms/SIZE) < 0.01) return -1;
        
        let r1=0, r2=SIZE-1, thres=0.2;
        for(let i=0; i<SIZE/2; i++) if(Math.abs(buf[i])<thres) { r1=i; break; }
        for(let i=1; i<SIZE/2; i++) if(Math.abs(buf[SIZE-i])<thres) { r2=SIZE-i; break; }
        
        buf = buf.slice(r1, r2);
        SIZE = buf.length;
        let c = new Array(SIZE).fill(0);
        for(let i=0; i<SIZE; i++) for(let j=0; j<SIZE-i; j++) c[i] = c[i] + buf[j]*buf[j+i];
        
        let d = 0; while(c[d] > c[d+1]) d++;
        let maxval = -1, maxpos = -1;
        for(let i=d; i<SIZE; i++) if(c[i] > maxval) { maxval = c[i]; maxpos = i; }
        return sampleRate/maxpos;
    }

    function loop() {
        let buffer = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buffer);
        
        let pitch = autoCorrelate(buffer, audioCtx.sampleRate);
        if (pitch > 50) {
            let n = Math.round(12 * (Math.log(pitch / 440) / Math.log(2)) + 69);
            const notas = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
            let nota = notas[n % 12];
            document.getElementById('display').innerText = nota;
            historico.push({nota, time: new Date().toLocaleTimeString()});
        }
        requestAnimationFrame(loop);
    }

    function setModo(m, btn) {
        modo = m;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('label').innerText = "Modo: " + m;
    }

    document.getElementById('btnRecord').onclick = iniciar;
    document.getElementById('btnStop').onclick = () => location.reload();
</script>
</body>
</html>
