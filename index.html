<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ear AI Pro - Studio Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        :root { 
            --accent: #00e676; 
            --accent-glow: rgba(0,230,118,0.3);
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --danger: #ff1744;
            --warning: #ffa726;
            --text-primary: #ffffff;
            --text-secondary: #8888aa;
            --border-color: #2a2a3a;
        }
        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body { 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            font-family: 'Inter', -apple-system, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            padding: 12px;
            background-image: radial-gradient(circle at 50% 0%, rgba(0,230,118,0.03) 0%, transparent 70%);
        }
        
        /* Container Principal */
        .container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            max-width: 520px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto;
            padding-bottom: 4px;
        }
        
        /* Visualizador */
        .visualizer-wrapper {
            background: #000;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            position: relative;
            height: 100px;
        }
        #visualizer { 
            width: 100%; 
            height: 100%; 
            display: block;
        }
        .visualizer-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            pointer-events: none;
        }
        
        /* Display Area - Estúdio */
        .display-area { 
            background: var(--bg-card); 
            padding: 18px 20px; 
            border-radius: 16px; 
            text-align: center; 
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 120px;
            position: relative;
            overflow: hidden;
        }
        .display-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }
        .display-area.recording::before { opacity: 0.1; }
        .display-area.recording { 
            border-color: var(--accent); 
            box-shadow: 0 0 40px rgba(0,230,118,0.05);
        }
        .display-area.idle { border-color: var(--border-color); }
        
        .mode-label { 
            font-size: 0.65rem; 
            color: var(--text-secondary); 
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
        }
        
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .status-dot.recording { 
            background: var(--danger); 
            animation: pulse-dot 1s infinite;
            box-shadow: 0 0 12px rgba(255,23,68,0.4);
        }
        .status-dot.idle { background: #444466; }
        .status-dot.detected { 
            background: var(--accent); 
            box-shadow: 0 0 16px var(--accent-glow);
        }
        
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }
        
        .display { 
            font-size: 3.8rem; 
            font-weight: 800; 
            font-family: 'Inter', sans-serif;
            line-height: 1.1;
            min-height: 58px;
            transition: all 0.2s ease;
            letter-spacing: -1px;
            text-shadow: 0 0 30px rgba(0,230,118,0.1);
        }
        .display.wrong { 
            color: var(--danger); 
            animation: shake 0.3s ease;
            text-shadow: 0 0 30px rgba(255,23,68,0.3);
        }
        .display.close { 
            color: var(--warning); 
            text-shadow: 0 0 30px rgba(255,167,38,0.2);
        }
        .display.in-tune { 
            color: var(--accent); 
            text-shadow: 0 0 40px var(--accent-glow);
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        
        .display-sub {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
            min-height: 22px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        
        /* Indicador de Afinação */
        .tuner-container {
            margin-top: 10px;
            padding: 0 10px;
        }
        .tuner-indicator {
            height: 4px;
            background: #1a1a2a;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .tuner-bar {
            height: 100%;
            width: 50%;
            background: var(--accent);
            transition: width 0.08s ease, background 0.2s ease;
            border-radius: 4px;
        }
        .tuner-center {
            position: absolute;
            left: 50%;
            top: -3px;
            width: 2px;
            height: 10px;
            background: var(--text-primary);
            transform: translateX(-50%);
            border-radius: 2px;
        }
        .tuner-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.5rem;
            color: var(--text-secondary);
            padding: 2px 4px 0;
            opacity: 0.5;
        }
        
        /* Grid de Modos */
        .modes-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 6px; 
        }
        .modes-grid button { 
            padding: 12px 8px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
            font-weight: 600; 
            background: var(--bg-card); 
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            font-family: 'Inter', sans-serif;
            position: relative;
            backdrop-filter: blur(10px);
        }
        .modes-grid button:hover { 
            border-color: #444466;
            transform: translateY(-1px);
        }
        .modes-grid button:active { transform: scale(0.95); }
        .modes-grid button.active { 
            background: var(--accent); 
            color: #000; 
            border-color: var(--accent);
            box-shadow: 0 0 40px rgba(0,230,118,0.15);
            transform: translateY(-1px);
        }
        .modes-grid button .icon {
            display: block;
            font-size: 1.4rem;
            margin-bottom: 2px;
        }
        .modes-grid button .label {
            display: block;
            font-size: 0.65rem;
            font-weight: 700;
        }
        
        /* Área de Letras */
        .lyrics-section {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 12px 14px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            transition: all 0.3s ease;
        }
        .lyrics-section.active { 
            display: block;
            border-color: var(--accent);
        }
        .lyrics-section .chord {
            color: var(--accent);
            font-weight: 700;
            display: inline-block;
            margin: 0 2px;
            padding: 0 6px;
            background: rgba(0,230,118,0.08);
            border-radius: 4px;
            font-size: 0.7rem;
            border: 1px solid rgba(0,230,118,0.1);
        }
        .lyrics-section .lyric {
            color: var(--text-primary);
            display: inline;
            font-size: 0.8rem;
            line-height: 1.8;
        }
        .lyrics-section .line {
            margin-bottom: 2px;
        }
        .lyrics-section .highlight {
            background: rgba(0,230,118,0.05);
            border-radius: 3px;
            padding: 0 2px;
        }
        
        /* Input de Letras */
        .input-area {
            display: none;
            gap: 6px;
            padding: 0 2px;
        }
        .input-area.active { display: flex; }
        .input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
        }
        .input-area input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0,230,118,0.05);
        }
        .input-area input::placeholder {
            color: var(--text-secondary);
        }
        .input-area button {
            padding: 10px 20px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: #000;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        .input-area button:active { transform: scale(0.95); }
        
        /* Histórico */
        .history {
            max-height: 48px;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 6px 10px;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            min-height: 38px;
            align-items: center;
        }
        .history-empty {
            color: var(--text-secondary);
            font-size: 0.65rem;
            width: 100%;
            text-align: center;
            opacity: 0.5;
        }
        .history-item {
            background: var(--bg-card);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            white-space: nowrap;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .history-item.current { 
            color: var(--accent); 
            border-color: var(--accent);
            background: rgba(0,230,118,0.06);
            box-shadow: 0 0 20px rgba(0,230,118,0.05);
        }
        .history-item.chord {
            color: var(--warning);
            border-color: rgba(255,167,38,0.3);
        }
        .history-item .badge {
            font-size: 0.5rem;
            opacity: 0.5;
            margin-left: 4px;
        }
        
        /* Footer - Botões */
        .footer { 
            display: flex; 
            gap: 8px; 
            padding: 8px 0 4px;
            max-width: 520px;
            margin: 0 auto;
            width: 100%;
        }
        .footer button { 
            padding: 14px 16px; 
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.85rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .footer button:active { transform: scale(0.95); }
        
        #btnRecord { 
            flex: 2; 
            background: var(--accent); 
            color: #000;
            box-shadow: 0 0 30px rgba(0,230,118,0.1);
        }
        #btnRecord:hover:not(:disabled) {
            box-shadow: 0 0 50px rgba(0,230,118,0.2);
            transform: translateY(-2px);
        }
        #btnRecord:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        #btnRecord.recording {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 0 30px rgba(255,23,68,0.2);
            animation: pulse-record 1.5s infinite;
        }
        @keyframes pulse-record {
            0%, 100% { box-shadow: 0 0 30px rgba(255,23,68,0.2); }
            50% { box-shadow: 0 0 60px rgba(255,23,68,0.4); }
        }
        
        #btnLyrics {
            flex: 0.8;
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            font-size: 0.75rem;
        }
        #btnLyrics.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0,230,118,0.1);
        }
        
        #btnExport { 
            flex: 1; 
            background: var(--bg-card); 
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        #btnExport:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        #btnExport.active { 
            background: #1a237e; 
            color: #fff;
            border-color: #1a237e;
            box-shadow: 0 0 30px rgba(26,35,126,0.2);
        }
        #btnExport.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 50px rgba(26,35,126,0.3);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { 
            background: var(--border-color); 
            border-radius: 10px;
        }
        
        /* Responsivo */
        @media (max-width: 400px) {
            .display { font-size: 2.8rem; }
            .modes-grid button { padding: 8px 4px; }
            .modes-grid button .icon { font-size: 1.2rem; }
            .footer button { font-size: 0.7rem; padding: 10px 12px; }
            .display-area { padding: 14px 16px; min-height: 100px; }
        }
        
        @media (min-width: 768px) {
            .container { max-width: 600px; }
            .footer { max-width: 600px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Visualizador -->
    <div class="visualizer-wrapper">
        <canvas id="visualizer"></canvas>
        <div class="visualizer-overlay"></div>
    </div>
    
    <!-- Display Principal -->
    <div class="display-area idle" id="displayArea">
        <div class="mode-label" id="label">
            <span class="status-dot idle" id="statusDot"></span>
            <span id="modeText">PRONTO</span>
            <span style="opacity:0.3;font-size:0.5rem;">●</span>
            <span id="bpmDisplay" style="font-size:0.5rem;color:var(--text-secondary);">-- BPM</span>
        </div>
        <div id="display" class="display">---</div>
        <div id="displaySub" class="display-sub">Toque ou cante para começar</div>
        
        <div class="tuner-container">
            <div class="tuner-indicator" id="tunerIndicator">
                <div class="tuner-bar" id="tunerBar"></div>
                <div class="tuner-center"></div>
            </div>
            <div class="tuner-labels">
                <span>⬇ Grave</span>
                <span>🎯</span>
                <span>Agudo ⬆</span>
            </div>
        </div>
    </div>
    
    <!-- Modos -->
    <div class="modes-grid">
        <button onclick="setModo('AFINADOR', this)" class="active">
            <span class="icon">🎯</span>
            <span class="label">Afinador</span>
        </button>
        <button onclick="setModo('ACORDES', this)">
            <span class="icon">🎹</span>
            <span class="label">Acordes</span>
        </button>
        <button onclick="setModo('MELODIA', this)">
            <span class="icon">🎵</span>
            <span class="label">Melodia</span>
        </button>
    </div>
    
    <!-- Letras -->
    <div class="lyrics-section" id="lyricsArea">
        <div style="color:var(--text-secondary); text-align:center; padding:8px; font-size:0.75rem;">
            📝 Cole a letra e clique em Processar
        </div>
    </div>
    
    <div class="input-area" id="inputArea">
        <input type="text" id="lyricsInput" placeholder="Cole a letra da música aqui..." />
        <button onclick="processLyrics()">Processar</button>
    </div>
    
    <!-- Histórico -->
    <div id="historyContainer" class="history">
        <div class="history-empty">Histórico de notas e acordes</div>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    <button id="btnRecord">🎤 Iniciar</button>
    <button id="btnLyrics" onclick="toggleLyrics()">📝 Letra</button>
    <button id="btnExport" disabled>📄 PDF</button>
</div>

<script>
    // ============================================================
    //  CONFIGURAÇÕES
    // ============================================================
    const NOTAS = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const FREQ_NOTAS = {
        'C': 261.63, 'C#': 277.18, 'D': 293.66, 'D#': 311.13,
        'E': 329.63, 'F': 349.23, 'F#': 369.99, 'G': 392.00,
        'G#': 415.30, 'A': 440.00, 'A#': 466.16, 'B': 493.88
    };
    
    // ============================================================
    //  VARIÁVEIS GLOBAIS
    // ============================================================
    let audioContext = null;
    let analyser = null;
    let modo = 'AFINADOR';
    let historico = [];
    let isRecording = false;
    let animationId = null;
    let canvas = null;
    let ctx = null;
    let mediaStream = null;
    let currentFreq = 0;
    let letrasAtivas = false;
    let musicaAtual = [];
    let acordesDetectados = [];
    let ultimaNota = '';
    let contadorSilencio = 0;
    
    // ============================================================
    //  INICIALIZAÇÃO
    // ============================================================
    function initCanvas() {
        canvas = document.getElementById('visualizer');
        ctx = canvas.getContext('2d');
        resizeCanvas();
    }
    
    function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        drawEmptyCanvas();
    }
    
    function drawEmptyCanvas() {
        if (!ctx) return;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#1a1a2a';
        ctx.lineWidth = 1;
        ctx.beginPath();
        const midY = canvas.height / 2;
        ctx.moveTo(0, midY);
        ctx.lineTo(canvas.width, midY);
        ctx.stroke();
    }
    
    // ============================================================
    //  VISUALIZADOR DE ÁUDIO
    // ============================================================
    function drawVisualizer(dataArray) {
        if (!ctx) return;
        const width = canvas.width;
        const height = canvas.height;
        const midY = height / 2;
        
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, width, height);
        
        // Linha central
        ctx.strokeStyle = '#1a1a2a';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, midY);
        ctx.lineTo(width, midY);
        ctx.stroke();
        
        // Forma de onda
        ctx.strokeStyle = '#00e676';
        ctx.lineWidth = 2;
        ctx.shadowColor = 'rgba(0,230,118,0.2)';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        
        const step = Math.max(1, Math.floor(dataArray.length / width));
        const amp = height / 2 * 0.8;
        
        for (let i = 0; i < width; i++) {
            const index = Math.floor(i * step);
            const value = dataArray[index] || 0;
            const x = i;
            const y = midY + (value * amp);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
    }
    
    // ============================================================
    //  DETECÇÃO DE PITCH (Autocorrelação)
    // ============================================================
    function autoCorrelate(buffer, sampleRate) {
        const size = buffer.length;
        let rms = 0;
        for (let i = 0; i < size; i++) {
            rms += buffer[i] * buffer[i];
        }
        rms = Math.sqrt(rms / size);
        if (rms < 0.01) return -1;
        
        let maxIndex = -1;
        let maxValue = -1;
        
        for (let i = 0; i < size / 2; i++) {
            let corr = 0;
            for (let j = 0; j < size - i; j++) {
                corr += buffer[j] * buffer[j + i];
            }
            if (corr > maxValue) {
                maxValue = corr;
                maxIndex = i;
            }
        }
        
        if (maxIndex > 0 && maxValue > 0.1) {
            return sampleRate / maxIndex;
        }
        return -1;
    }
    
    function freqToNote(freq) {
        if (freq < 50 || freq > 2000) return null;
        const a4 = 440;
        const c0 = a4 * Math.pow(2, -69/12);
        const noteNumber = Math.round(12 * Math.log2(freq / c0));
        const noteIndex = ((noteNumber % 12) + 12) % 12;
        return NOTAS[noteIndex];
    }
    
    function getNoteFrequency(note) {
        return FREQ_NOTAS[note] || 0;
    }
    
    // ============================================================
    //  DETECÇÃO DE ACORDES
    // ============================================================
    function detectChordAdvanced(nota) {
        const chordMap = {
            'C': ['C', 'E', 'G'],
            'C#': ['C#', 'F', 'G#'],
            'D': ['D', 'F#', 'A'],
            'D#': ['D#', 'G', 'A#'],
            'E': ['E', 'G#', 'B'],
            'F': ['F', 'A', 'C'],
            'F#': ['F#', 'A#', 'C#'],
            'G': ['G', 'B', 'D'],
            'G#': ['G#', 'C', 'D#'],
            'A': ['A', 'C#', 'E'],
            'A#': ['A#', 'D', 'F'],
            'B': ['B', 'D#', 'F#']
        };
        return chordMap[nota] || null;
    }
    
    // ============================================================
    //  PROCESSAMENTO DE ÁUDIO (LOOP PRINCIPAL)
    // ============================================================
    function processAudio() {
        if (!analyser || !isRecording) return;
        
        const bufferLength = analyser.fftSize;
        const dataArray = new Float32Array(bufferLength);
        analyser.getFloatTimeDomainData(dataArray);
        
        drawVisualizer(dataArray);
        
        const freq = autoCorrelate(dataArray, audioContext.sampleRate);
        const display = document.getElementById('display');
        const sub = document.getElementById('displaySub');
        const tunerBar = document.getElementById('tunerBar');
        const displayArea = document.getElementById('displayArea');
        const statusDot = document.getElementById('statusDot');
        
        if (freq > 50 && freq < 2000) {
            currentFreq = freq;
            const nota = freqToNote(freq);
            contadorSilencio = 0;
            
            if (nota) {
                let displayText = nota;
                let subText = `${Math.round(freq)} Hz`;
                let isInTune = false;
                let isClose = false;
                let displayClass = 'display';
                
                // === MODO AFINADOR ===
                if (modo === 'AFINADOR') {
                    const targetFreq = getNoteFrequency(nota);
                    if (targetFreq > 0) {
                        const diff = ((freq - targetFreq) / targetFreq) * 100;
                        const diffPercent = Math.abs(diff);
                        
                        // Barra do afinador
                        const barPercent = Math.min(Math.max(diff * 2 + 50, 0), 100);
                        tunerBar.style.width = barPercent + '%';
                        
                        if (diffPercent < 0.5) {
                            tunerBar.style.background = 'var(--accent)';
                            isInTune = true;
                            displayClass = 'display in-tune';
                            subText = `✅ Afinado! (${Math.round(freq)} Hz)`;
                        } else if (diffPercent < 2) {
                            tunerBar.style.background = 'var(--warning)';
                            isClose = true;
                            displayClass = 'display close';
                            subText = diff < 0 ? '⬇️ Grave (+' + diffPercent.toFixed(1) + '%)' : '⬆️ Agudo (+' + diffPercent.toFixed(1) + '%)';
                        } else {
                            tunerBar.style.background = 'var(--danger)';
                            displayClass = 'display wrong';
                            subText = diff < 0 ? '⬇️ Muito grave' : '⬆️ Muito agudo';
                        }
                    }
                    
                    // Atualiza display
                    display.className = displayClass;
                    display.textContent = displayText;
                    display.style.color = isInTune ? 'var(--accent)' : 
                                         isClose ? 'var(--warning)' : 'var(--danger)';
                    sub.textContent = subText;
                    
                    // Status dot
                    statusDot.className = 'status-dot ' + (isInTune ? 'detected' : 'recording');
                    document.getElementById('modeText').textContent = `AFINADOR ${isInTune ? '✅' : ''}`;
                    
                    // Adiciona ao histórico se estiver afinado ou próximo
                    if (isInTune || isClose) {
                        historico.push({
                            nota: nota,
                            modo: modo,
                            frequencia: Math.round(freq),
                            tempo: new Date().toLocaleTimeString(),
                            afinado: isInTune,
                            diff: isClose ? Math.round(Math.abs(((freq - targetFreq) / targetFreq) * 100) * 10) / 10 : 0
                        });
                        updateHistory();
                    }
                    
                // === MODO ACORDES ===
                } else if (modo === 'ACORDES') {
                    const chordNotes = detectChordAdvanced(nota);
                    if (chordNotes) {
                        displayText = nota;
                        subText = `Acorde: ${chordNotes.join(' - ')}`;
                        display.className = 'display in-tune';
                        display.style.color = 'var(--accent)';
                        
                        // Registra acorde
                        if (ultimaNota !== nota) {
                            acordesDetectados.push({
                                chord: nota,
                                notes: chordNotes,
                                time: new Date().toLocaleTimeString()
                            });
                            ultimaNota = nota;
                            
                            // Adiciona ao histórico
                            historico.push({
                                nota: nota,
                                modo: 'ACORDE',
                                detalhe: chordNotes.join('+'),
                                tempo: new Date().toLocaleTimeString()
                            });
                            updateHistory();
                        }
                    } else {
                        displayText = nota;
                        subText = 'Acorde não identificado';
                        display.className = 'display';
                        display.style.color = 'var(--text-secondary)';
                    }
                    statusDot.className = 'status-dot detected';
                    document.getElementById('modeText').textContent = `ACORDES`;
                    
                // === MODO MELODIA ===
                } else {
                    display.className = 'display in-tune';
                    display.style.color = 'var(--accent)';
                    displayText = nota;
                    subText = `🎵 ${nota} (${Math.round(freq)} Hz)`;
                    statusDot.className = 'status-dot detected';
                    document.getElementById('modeText').textContent = `MELODIA`;
                    
                    // Adiciona ao histórico
                    if (ultimaNota !== nota) {
                        historico.push({
                            nota: nota,
                            modo: modo,
                            frequencia: Math.round(freq),
                            tempo: new Date().toLocaleTimeString()
                        });
                        updateHistory();
                        ultimaNota = nota;
                    }
                }
                
                // Atualiza display
                document.getElementById('display').textContent = displayText;
                document.getElementById('displaySub').textContent = subText;
                document.getElementById('displayArea').className = 'display-area recording';
                
                // Atualiza letras se ativo
                if (letrasAtivas && musicaAtual.length > 0) {
                    updateLyricsWithChord(nota);
                }
                
            } else {
                // Frequência detectada mas nota não identificada
                tunerBar.style.width = '50%';
                tunerBar.style.background = '#444';
                display.textContent = '---';
                display.className = 'display';
                display.style.color = 'var(--text-secondary)';
                sub.textContent = 'Sinal detectado';
                statusDot.className = 'status-dot recording';
                document.getElementById('modeText').textContent = modo;
            }
        } else {
            // Silêncio ou sinal muito baixo
            contadorSilencio++;
            if (contadorSilencio > 10) {
                tunerBar.style.width = '50%';
                tunerBar.style.background = '#444';
                display.textContent = '---';
                display.className = 'display';
                display.style.color = 'var(--text-secondary)';
                sub.textContent = contadorSilencio > 30 ? 'Aguardando sinal...' : 'Toque ou cante...';
                statusDot.className = 'status-dot recording';
                document.getElementById('modeText').textContent = modo;
                ultimaNota = '';
            }
        }
        
        animationId = requestAnimationFrame(processAudio);
    }
