<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Ear | Music Transcriber</title>
    <style>
        :root { --dark: #121212; --panel: #1e1e1e; --green: #00e676; --amber: #ffc107; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .studio-container { background: var(--panel); padding: 30px; border-radius: 25px; width: 350px; border: 1px solid #333; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        .vu-meter { background: #000; height: 120px; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: var(--green); font-family: monospace; font-size: 1.2rem; border: 2px solid #333; margin-bottom: 20px; }
        
        h2 { margin: 0; color: var(--amber); text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; text-align: center; }
        
        .btn-audio { width: 100%; padding: 15px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; text-transform: uppercase; }
        #btnRecord { background: var(--green); color: black; }
        #btnStop { background: #d32f2f; color: white; }
        
        #display { color: var(--green); font-size: 1.8rem; text-align: center; margin: 20px 0; min-height: 40px; text-shadow: 0 0 10px rgba(0,230,118,0.3); }
    </style>
</head>
<body>

<div class="studio-container">
    <h2>Max Ear Pro</h2>
    <div class="vu-meter" id="vu">READY</div>
    <div id="display">---</div>
    <button class="btn-audio" id="btnRecord">Rec ◉</button>
    <button class="btn-audio" id="btnStop" disabled>Stop ■</button>
</div>

<script>
    // [A lógica do JavaScript continua a mesma de antes]
    // Apenas adicionei um efeito visual no "VU METER" para ficar musical:
    function atualizarVU(nota) {
        document.getElementById('vu').innerText = nota ? nota.toUpperCase() : "---";
    }
    
    // Na sua função de análise, chame:
    // atualizarVU(nota);
</script>
</body>
</html>
