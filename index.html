<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Max Ear Pro | Analisador de Acordes</title>
    <style>
        :root { --primary: #2563eb; --accent: #10b981; --bg: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 2rem; border-radius: 20px; box-shadow: 0 20px 25px rgba(0,0,0,0.3); width: 100%; max-width: 450px; text-align: center; }
        canvas { width: 100%; height: 150px; background: #000; border-radius: 10px; margin: 20px 0; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        #btnRecord { background: var(--primary); color: white; }
        #btnStop { background: #ef4444; color: white; }
        #status { font-size: 0.9rem; color: var(--accent); margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Max Ear Pro</h2>
    <canvas id="visualizer"></canvas>
    <div id="status">Pronto para capturar</div>
    <button class="btn" id="btnRecord">INICIAR TRANSCRIÇÃO</button>
    <button class="btn" id="btnStop" disabled>PARAR E SALVAR</button>
</div>

<script>
    let audioCtx, analyser, dataArray, source;
    const canvas = document.getElementById('visualizer');
    const canvasCtx = canvas.getContext('2d');

    document.getElementById('btnRecord').onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        source = audioCtx.createMediaStreamSource(stream);
        
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        source.connect(analyser);

        draw();
        document.getElementById('status').innerText = "Analisando frequências...";
        document.getElementById('btnRecord').disabled = true;
        document.getElementById('btnStop').disabled = false;
    };

    function draw() {
        requestAnimationFrame(draw);
        const bufferLength = analyser.frequencyBinCount;
        dataArray = new Uint8Array(bufferLength);
        analyser.getByteTimeDomainData(dataArray);

        canvasCtx.fillStyle = 'black';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        canvasCtx.strokeStyle = '#10b981';
        canvasCtx.lineWidth = 2;
