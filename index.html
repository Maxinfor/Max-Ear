<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Max Ear | PDF Export</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* (Mantenha o seu CSS anterior aqui) */
    </style>
</head>
<body>

<div class="container">
    <h2>MAX EAR PRO</h2>
    <input type="text" id="inputLetra" placeholder="Cole a letra aqui (opcional)..." style="width:100%; margin-bottom:10px;">
    <div class="vu-meter" id="vu">---</div>
    <div id="display">Aguardando...</div>
    <button id="btnRecord">Rec ◉</button>
    <button id="btnStop" disabled>Salvar PDF ■</button>
</div>

<script>
    // ... (Mantenha toda a lógica de áudio anterior) ...

    document.getElementById('btnStop').onclick = () => {
        cancelAnimationFrame(animationId);
        audioCtx.close();
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const letra = document.getElementById('inputLetra').value;
        
        doc.setFontSize(20);
        doc.text("Cifra: " + new Date().toLocaleDateString(), 20, 20);
        
        doc.setFontSize(14);
        if (letra) {
            doc.text("Letra:", 20, 40);
            doc.text(letra, 20, 50);
            doc.text("Acordes detectados:", 20, 100);
        }
        
        doc.text(historicoNotas.join(" - "), 20, 120);
        doc.save("Cifra_MaxEar.pdf"); // Gera o PDF automaticamente
    };
</script>
</body>
</html>
