<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Max Ear Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #444; }
        canvas { width: 100%; height: 100px; background: #000; border-radius: 10px; margin-bottom: 10px; border: 1px solid #00e676; }
        .display { font-size: 2rem; color: #00e676; margin: 10px 0; font-weight: bold; }
        .regua { height: 20px; background: #222; border-radius: 10px; margin: 10px 0; position: relative; overflow: hidden; }
        #ponteiro { width: 4px; height: 100%; background: #00e676; position: absolute; left: 50%; transition: left 0.1s; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; background: #111; color: #fff; border: 1px solid #444; border-radius: 8px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        button { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .active { background: #00e676 !important; color: #000; }
    </style>
</head>
<body>

<div class="container">
    <h2>MAX EAR STUDIO</h2>
    <canvas id="visualizer"></canvas>
    <div id="display" class="display">---</div>
    <div class="regua"><div id="ponteiro"></div></div>
    <input type="text" id="inputCampo" placeholder="Campo (ex: Dó,Ré,Mi,Fá,Sol,Lá,Si)">
    <div class="btn-grid">
        <button class="mode-btn" onclick="setModo('AFINADOR', this)">AFINADOR</button>
        <button class="mode-btn" onclick="setModo('ACORDES', this)">ACORDES</button>
        <button class="mode-btn" onclick="setModo('MELODIA', this)">MELODIA</button>
    </div>
    <button id="btnRecord" style="width:100%; background:#00e676;">INICIAR</button>
    <button id="btnStop" style="width:100%; margin-top:5px; background:#d32f2f;">PARAR/PDF</button>
</div>

<script>
    let audioCtx, analyser, modoAtual = 'AFINADOR', historico = [], buffer = [];
    const canvas = document.getElementById('visualizer'), ctx = canvas.getContext('2d');
    const notasRef = ["Dó", "Dó#", "Ré", "Ré#", "Mi", "Fá", "Fá#", "Sol", "Sol#", "Lá", "Lá#", "Si"];
    const dicionario = { "Dó,Mi,Sol":"C", "Ré,Fá,Lá":"Dm", "Mi,Sol,Si":"Em", "Fá,Lá,Dó":"F", "Sol,Si,Ré":"G", "Lá,Dó,Mi":"Am" };

    function desenharOnda() {
        requestAnimationFrame(desenharOnda);
        let array = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteTimeDomainData(array);
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.lineWidth = 2; ctx.strokeStyle = '#00e676'; ctx.beginPath();
        for(let i=0; i<array.length; i++) {
            let v = array[i] / 128.0;
            let x = (i / array.length) * canvas.width;
            let y = v * canvas.height / 2;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    async function capturar() {
        let data = new Float32Array(2048);
        analyser.getFloatFrequencyData(data);
        let max = -Infinity, idx = 0;
        for(let i=0; i<data.length; i++) if(data[i] > max) { max = data[i]; idx = i; }
        
        if(max > -40) {
            let freq = idx * (44100/2048);
            let nIdx = Math.round(12 * (Math.log(freq / 440) / Math.log(2)) + 57) % 12;
            let nota = notasRef[nIdx];

            if(modoAtual === 'AFINADOR') {
                document.getElementById('display').innerText = nota;
                document.getElementById('ponteiro').style.left = (nIdx / 12 * 100) + "%";
                historico.push({tipo:'Afinador', valor: nota, time: new Date().toLocaleTimeString()});
            } 
            else if(modoAtual === 'ACORDES') {
                buffer.push(nota);
                if(buffer.length > 30) {
                    let acorde = dicionario[[...new Set(buffer)].sort().join(",")] || "Tocando...";
                    document.getElementById('display').innerText = acorde;
                    if(acorde !== "Tocando...") historico.push({tipo:'Acorde', valor: acorde, time: new Date().toLocaleTimeString()});
                    buffer = [];
                }
            }
            else if(modoAtual === 'MELODIA') {
                if(nota !== buffer[buffer.length-1]) {
                    document.getElementById('display').innerText = nota;
                    historico.push({tipo:'Melodia', valor: nota, time: new Date().toLocaleTimeString()});
                }
                buffer.push(nota);
            }
        }
        if(!document.getElementById('btnStop').disabled) requestAnimationFrame(capturar);
    }

    function setModo(m, btn) {
        modoAtual = m;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        buffer = [];
    }

    document.getElementById('btnRecord').onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        audioCtx = new AudioContext(); analyser = audioCtx.createAnalyser();
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        desenharOnda(); capturar();
        document.getElementById('btnStop').disabled = false;
    };

    document.getElementById('btnStop').onclick = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        historico.forEach((h,i) => doc.text(`${i+1}. ${h.tipo}: ${h.valor}`, 20, 20+(i*10)));
        doc.save("Relatorio.pdf");
        location.reload();
    };
</script>
</body>
</html>
