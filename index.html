<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ear AI Pro - Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            color: #fff;
            font-family: -apple-system, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 10px;
            overflow: hidden;
        }
        
        .container {
            flex: 1;
            max-width: 520px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            padding-bottom: 4px;
        }
        
        /* Visualizador */
        .visualizer-wrapper {
            background: #000;
            border-radius: 14px;
            border: 1px solid #1a1a2a;
            height: 60px;
            overflow: hidden;
            position: relative;
        }
        #visualizer {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* Display */
        .display-area {
            background: #12121a;
            border-radius: 14px;
            padding: 12px 16px;
            text-align: center;
            border: 1px solid #1a1a2a;
            transition: all 0.3s ease;
            min-height: 90px;
        }
        .display-area.recording {
            border-color: #00e676;
            box-shadow: 0 0 30px rgba(0,230,118,0.05);
        }
        .display-area.exercise {
            border-color: #ffa726;
            box-shadow: 0 0 30px rgba(255,167,38,0.05);
        }
        .display-area.music {
            border-color: #7c4dff;
            box-shadow: 0 0 30px rgba(124,77,255,0.05);
        }
        
        .mode-label {
            font-size: 0.5rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2px;
        }
        
        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }
        .status-dot.idle { background: #444; }
        .status-dot.recording { 
            background: #ff1744; 
            animation: blink 0.8s infinite;
        }
        .status-dot.detected { background: #00e676; }
        .status-dot.exercise { background: #ffa726; }
        .status-dot.music { background: #7c4dff; }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .display {
            font-size: 2.8rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            min-height: 42px;
            transition: color 0.2s ease;
        }
        .display.in-tune { color: #00e676; }
        .display.wrong { color: #ff1744; }
        .display.close { color: #ffa726; }
        .display.idle { color: #444; }
        .display.exercise { color: #ffa726; }
        .display.music { color: #7c4dff; }
        
        .display-sub {
            font-size: 0.65rem;
            color: #666;
            min-height: 16px;
            margin-top: 2px;
        }
        
        /* Indicador de afinação */
        .tuner-container {
            margin-top: 4px;
            padding: 0 10px;
        }
        .tuner-bar-bg {
            height: 2px;
            background: #1a1a2a;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .tuner-bar {
            height: 100%;
            width: 50%;
            background: #00e676;
            transition: width 0.05s ease, background 0.2s ease;
            border-radius: 4px;
        }
        .tuner-center {
            position: absolute;
            left: 50%;
            top: -2px;
            width: 2px;
            height: 6px;
            background: #fff;
            transform: translateX(-50%);
            border-radius: 2px;
        }
        
        /* Escalas - Notas em destaque */
        .scale-display {
            display: none;
            gap: 3px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 4px;
            padding: 4px;
            background: #0a0a0f;
            border-radius: 8px;
            border: 1px solid #1a1a2a;
        }
        .scale-display.active {
            display: flex;
        }
        .scale-note {
            padding: 3px 8px;
            border-radius: 6px;
            background: #1a1a2a;
            color: #444;
            font-size: 0.65rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .scale-note.active {
            background: #00e676;
            color: #000;
            border-color: #00e676;
            box-shadow: 0 0 20px rgba(0,230,118,0.2);
            transform: scale(1.05);
        }
        .scale-note.correct {
            background: #00e676;
            color: #000;
            border-color: #00e676;
        }
        .scale-note.wrong {
            background: #ff1744;
            color: #fff;
            border-color: #ff1744;
            animation: shake 0.3s ease;
        }
        .scale-note.current-target {
            border-color: #ffa726;
            box-shadow: 0 0 20px rgba(255,167,38,0.15);
        }
        .scale-note.played {
            background: #7c4dff;
            color: #fff;
            border-color: #7c4dff;
        }
        
        /* Botões de Modo */
        .modes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
        }
        .modes-grid button {
            padding: 6px 4px;
            border-radius: 10px;
            border: 1px solid #1a1a2a;
            background: #12121a;
            color: #666;
            font-weight: 600;
            font-size: 0.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .modes-grid button.active {
            background: #00e676;
            color: #000;
            border-color: #00e676;
            box-shadow: 0 0 30px rgba(0,230,118,0.1);
        }
        .modes-grid button .icon {
            display: block;
            font-size: 1.1rem;
            margin-bottom: 1px;
        }
        
        /* Exercícios */
        .exercise-controls {
            display: none;
            gap: 4px;
            flex-wrap: wrap;
            padding: 4px;
            background: #0a0a0f;
            border-radius: 10px;
            border: 1px solid #1a1a2a;
        }
        .exercise-controls.active {
            display: flex;
        }
        .exercise-controls select {
            flex: 1;
            padding: 5px 8px;
            border-radius: 8px;
            border: 1px solid #1a1a2a;
            background: #12121a;
            color: #fff;
            font-size: 0.65rem;
            font-family: inherit;
            min-width: 100px;
        }
        .exercise-controls select:focus {
            outline: none;
            border-color: #ffa726;
        }
        .exercise-controls button {
            padding: 5px 12px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .exercise-controls button:active {
            transform: scale(0.95);
        }
        .btn-play-exercise {
            background: #ffa726;
            color: #000;
        }
        .btn-play-exercise.playing {
            background: #ff1744;
            color: #fff;
        }
        .btn-start-exercise {
            background: #00e676;
            color: #000;
        }
        .btn-start-exercise:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .btn-stop-exercise {
            background: #ff1744;
            color: #fff;
            display: none;
        }
        .btn-stop-exercise.active {
            display: inline-block;
        }
        
        /* Música */
        .music-controls {
            display: none;
            gap: 4px;
            flex-wrap: wrap;
            padding: 4px;
            background: #0a0a0f;
            border-radius: 10px;
            border: 1px solid #1a1a2a;
        }
        .music-controls.active {
            display: flex;
        }
        .music-controls textarea {
            width: 100%;
            padding: 6px 8px;
            border-radius: 8px;
            border: 1px solid #1a1a2a;
            background: #12121a;
            color: #fff;
            font-size: 0.65rem;
            font-family: monospace;
            resize: vertical;
            min-height: 50px;
        }
        .music-controls textarea:focus {
            outline: none;
            border-color: #7c4dff;
        }
        .music-controls .btn-group {
            display: flex;
            gap: 4px;
            width: 100%;
        }
        .music-controls button {
            flex: 1;
            padding: 5px 10px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .music-controls button:active {
            transform: scale(0.95);
        }
        .btn-load-music {
            background: #7c4dff;
            color: #fff;
        }
        .btn-start-music {
            background: #00e676;
            color: #000;
        }
        .btn-start-music:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .btn-stop-music {
            background: #ff1744;
            color: #fff;
            display: none;
        }
        .btn-stop-music.active {
            display: inline-block;
        }
        
        /* Histórico */
        .history {
            background: #0a0a0f;
            border-radius: 10px;
            border: 1px solid #1a1a2a;
            padding: 3px 6px;
            min-height: 26px;
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            align-items: center;
            overflow-y: auto;
            max-height: 32px;
        }
        .history-empty {
            color: #444;
            font-size: 0.5rem;
            width: 100%;
            text-align: center;
        }
        .history-item {
            background: #12121a;
            padding: 1px 6px;
            border-radius: 8px;
            font-size: 0.5rem;
            color: #888;
            border: 1px solid #1a1a2a;
            white-space: nowrap;
        }
        .history-item.current {
            color: #00e676;
            border-color: #00e676;
        }
        .history-item.wrong {
            color: #ff1744;
            border-color: #ff1744;
        }
        .history-item.music {
            color: #7c4dff;
            border-color: #7c4dff;
        }
        
        /* Progresso da música */
        .music-progress {
            display: none;
            width: 100%;
            height: 2px;
            background: #1a1a2a;
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }
        .music-progress.active {
            display: block;
        }
        .music-progress-bar {
            height: 100%;
            width: 0%;
            background: #7c4dff;
            transition: width 0.3s ease;
        }
        
        /* Footer */
        .footer {
            display: flex;
            gap: 5px;
            padding: 4px 0 2px;
            max-width: 520px;
            margin: 0 auto;
            width: 100%;
        }
        .footer button {
            padding: 8px 12px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .footer button:active {
            transform: scale(0.95);
        }
        
        #btnRecord {
            flex: 2;
            background: #00e676;
            color: #000;
        }
        #btnRecord:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #btnRecord.recording {
            background: #ff1744;
            color: #fff;
        }
        
        #btnExport {
            flex: 1;
            background: #12121a;
            color: #666;
            border: 1px solid #1a1a2a;
        }
        #btnExport:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        #btnExport.active {
            background: #1a237e;
            color: #fff;
            border-color: #1a237e;
        }
        
        /* Scroll */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: #0a0a0f; }
        ::-webkit-scrollbar-thumb { background: #1a1a2a; border-radius: 10px; }
        
        @media (max-width: 400px) {
            .display { font-size: 2.2rem; }
            .modes-grid button { padding: 4px 2px; font-size: 0.5rem; }
            .modes-grid button .icon { font-size: 0.9rem; }
            .footer button { font-size: 0.6rem; padding: 6px 8px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Visualizador -->
    <div class="visualizer-wrapper">
        <canvas id="visualizer"></canvas>
    </div>
    
    <!-- Display -->
    <div class="display-area idle" id="displayArea">
        <div class="mode-label">
            <span class="status-dot idle" id="statusDot"></span>
            <span id="modeText">PRONTO</span>
        </div>
        <div id="display" class="display idle">---</div>
        <div id="displaySub" class="display-sub">Toque ou cante para começar</div>
        
        <!-- Escala Display -->
        <div class="scale-display" id="scaleDisplay"></div>
        
        <!-- Progresso Música -->
        <div class="music-progress" id="musicProgress">
            <div class="music-progress-bar" id="musicProgressBar"></div>
        </div>
        
        <div class="tuner-container">
            <div class="tuner-bar-bg">
                <div class="tuner-bar" id="tunerBar"></div>
                <div class="tuner-center"></div>
            </div>
        </div>
    </div>
    
    <!-- Modos -->
    <div class="modes-grid">
        <button onclick="setModo('AFINADOR', this)" class="active">
            <span class="icon">🎯</span>
            Afinador
        </button>
        <button onclick="setModo('EXERCICIO', this)">
            <span class="icon">🎼</span>
            Exercício
        </button>
        <button onclick="setModo('MUSICA', this)">
            <span class="icon">🎤</span>
            Música
        </button>
    </div>
    
    <!-- Exercícios -->
    <div class="exercise-controls" id="exerciseControls">
        <select id="exerciseSelect">
            <option value="maior_asc">Escala Maior Ascendente</option>
            <option value="maior_desc">Escala Maior Descendente</option>
            <option value="menor_asc">Escala Menor Ascendente</option>
            <option value="menor_desc">Escala Menor Descendente</option>
            <option value="maior_harm">Escala Maior Harmônica</option>
            <option value="menor_harm">Escala Menor Harmônica</option>
        </select>
        <button class="btn-play-exercise" id="btnPlayExercise" onclick="playExercise()">▶ Tocar</button>
        <button class="btn-start-exercise" id="btnStartExercise" onclick="startExercise()">🎯 Iniciar</button>
        <button class="btn-stop-exercise" id="btnStopExercise" onclick="stopExercise()">⏹ Parar</button>
    </div>
    
    <!-- Música -->
    <div class="music-controls" id="musicControls">
        <textarea id="musicInput" placeholder="Cole a música com cifras aqui...&#10;Ex:&#10;[C] Meu [G] bem querer&#10;[Am] Quero te [F] ver"></textarea>
        <div class="btn-group">
            <button class="btn-load-music" onclick="loadMusic()">📥 Carregar</button>
            <button class="btn-start-music" id="btnStartMusic" onclick="startMusic()" disabled>🎤 Começar</button>
            <button class="btn-stop-music" id="btnStopMusic" onclick="stopMusic()">⏹ Parar</button>
        </div>
    </div>
    
    <!-- Histórico -->
    <div id="historyContainer" class="history">
        <div class="history-empty">Histórico de notas</div>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    <button id="btnRecord">🎤 Iniciar</button>
    <button id="btnExport" disabled>📄 PDF</button>
</div>

<script>
    // ============================================================
    //  CONFIGURAÇÕES
    // ============================================================
    const NOTAS = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const FREQ_NOTAS = {
        'C': 261.63, 'C#': 277.18, 'D': 293.66, 'D#': 311.13,
        'E': 329.63, 'F': 349.23, 'F#': 369.99, 'G': 392.00,
        'G#': 415.30, 'A': 440.00, 'A#': 466.16, 'B': 493.88
    };
    
    // Escalas
    const ESCALAS = {
        'maior_asc': { 
            nome: 'Maior Ascendente',
            notas: ['C', 'D', 'E', 'F', 'G', 'A', 'B', 'C'],
            tipo: 'asc'
        },
        'maior_desc': { 
            nome: 'Maior Descendente',
            notas: ['C', 'B', 'A', 'G', 'F', 'E', 'D', 'C'],
            tipo: 'desc'
        },
        'menor_asc': { 
            nome: 'Menor Ascendente',
            notas: ['C', 'D', 'D#', 'F', 'G', 'G#', 'A#', 'C'],
            tipo: 'asc'
        },
        'menor_desc': { 
            nome: 'Menor Descendente',
            notas: ['C', 'A#', 'G#', 'G', 'F', 'D#', 'D', 'C'],
            tipo: 'desc'
        },
        'maior_harm': { 
            nome: 'Maior Harmônica',
            notas: ['C', 'D', 'E', 'F', 'G', 'G#', 'B', 'C'],
            tipo: 'asc'
        },
        'menor_harm': { 
            nome: 'Menor Harmônica',
            notas: ['C', 'D', 'D#', 'F', 'G', 'G#', 'B', 'C'],
            tipo: 'asc'
        }
    };
    
    // ============================================================
    //  VARIÁVEIS
    // ============================================================
    let audioCtx = null;
    let analyser = null;
    let modo = 'AFINADOR';
    let historico = [];
    let isRecording = false;
    let animId = null;
    let canvas = null;
    let ctx = null;
    let stream = null;
    let ultimaNota = '';
    let contadorSilencio = 0;
    
    // Exercício
    let escalaAtual = null;
    let indiceEscala = 0;
    let exercicioAtivo = false;
    let exercicioNotasAcertadas = 0;
    let exercicioTotalNotas = 0;
    let isPlayingExercise = false;
    let playInterval = null;
    let pianoCtx = null;
    let pianoGain = null;
    let notasTocadas = [];
    
    // Música
    let musicaAtual = [];
    let musicaIndex = 0;
    let musicaAtiva = false;
    let musicaErros = 0;
    let musicaAcertos = 0;
    let musicaTocadas = [];
    
    // ============================================================
    //  PIANO - SINTETIZADOR REALISTA
    // ============================================================
    function initPiano() {
        try {
            pianoCtx = new (window.AudioContext || window.webkitAudioContext)();
            pianoGain = pianoCtx.createGain();
            pianoGain.gain.value = 0.15;
            pianoGain.connect(pianoCtx.destination);
        } catch (e) {
            console.log('Erro ao iniciar piano:', e);
        }
    }
    
    function playPianoNote(freq, duration = 0.8, velocity = 0.7) {
        if (!pianoCtx || pianoCtx.state === 'closed') {
            initPiano();
            if (!pianoCtx) return;
        }
        
        try {
            const now = pianoCtx.currentTime;
            
            // Oscilador principal - onda senoidal com harmônicos
            const osc = pianoCtx.createOscillator();
            const gain = pianoCtx.createGain();
            const gain2 = pianoCtx.createGain();
            const gain3 = pianoCtx.createGain();
            
            // Harmônicos para som mais rico
            const osc2 = pianoCtx.createOscillator();
            const osc3 = pianoCtx.createOscillator();
            
            osc.type = 'sine';
            osc.frequency.value = freq;
            
            osc2.type = 'sine';
            osc2.frequency.value = freq * 2;
            osc2.detune.value = -2;
            
            osc3.type = 'sine';
            osc3.frequency.value = freq * 3;
            osc3.detune.value = 3;
            
            // Envelope de amplitude (ataque e decaimento realista)
            const envelope = pianoCtx.createGain();
            envelope.gain.setValueAtTime(0, now);
            envelope.gain.linearRampToValueAtTime(velocity * 0.8, now + 0.01);
            envelope.gain.linearRampToValueAtTime(velocity * 0.6, now + 0.05);
            envelope.gain.exponentialRampToValueAtTime(velocity * 0.1, now + duration);
            
            // Conectar
            osc.connect(gain);
            osc2.connect(gain2);
            osc3.connect(gain3);
            
            gain.connect(envelope);
            gain2.connect(envelope);
            gain3.connect(envelope);
            
            envelope.connect(pianoGain);
            
            // Iniciar
            osc.start(now);
            osc2.start(now);
            osc3.start(now);
            
            osc.stop(now + duration + 0.1);
            osc2.stop(now + duration + 0.1);
            osc3.stop(now + duration + 0.1);
            
            // Ataque com ruído (simula corda do piano)
            if (velocity > 0.3) {
                const noise = pianoCtx.createBufferSource();
                const bufferSize = pianoCtx.sampleRate * 0.02;
                const buffer = pianoCtx.createBuffer(1, bufferSize, pianoCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.3));
                }
                noise.buffer = buffer;
                const noiseGain = pianoCtx.createGain();
                noiseGain.gain.value = velocity * 0.08;
                noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                noise.connect(noiseGain);
                noiseGain.connect(pianoGain);
                noise.start(now);
                noise.stop(now + 0.05);
            }
            
            // Liberar recursos
            setTimeout(() => {
                try {
                    envelope.disconnect();
                    gain.disconnect();
                    gain2.disconnect();
                    gain3.disconnect();
                } catch (e) {}
            }, (duration + 0.1) * 1000);
            
        } catch (e) {
            // Fallback: som simples se falhar
            try {
                const osc = pianoCtx.createOscillator();
                const gain = pianoCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, pianoCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, pianoCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(pianoCtx.destination);
                osc.start();
                osc.stop(pianoCtx.currentTime + duration);
            } catch (e2) {}
        }
    }
    
    function playScaleNotes(notas, velocidade = 0.6) {
        let delay = 0;
        notas.forEach((nota, i) => {
            const freq = getNoteFreq(nota);
            if (freq > 0) {
                setTimeout(() => {
                    playPianoNote(freq, velocidade, 0.7);
                    
                    // Destacar nota na escala
                    const scaleNotes = document.querySelectorAll('.scale-note');
                    if (scaleNotes[i]) {
                        scaleNotes.forEach(el => el.classList.remove('played'));
                        scaleNotes[i].classList.add('played');
                    }
                }, delay);
                delay += velocidade * 1000;
            }
        });
        
        // Resetar destaque após terminar
        setTimeout(() => {
            document.querySelectorAll('.scale-note').forEach(el => el.classList.remove('played'));
        }, delay + 500);
        
        return delay;
    }
    
    // ============================================================
    //  INICIALIZAÇÃO DO CANVAS
    // ============================================================
    function initCanvas() {
        canvas = document.getElementById('visualizer');
        ctx = canvas.getContext('2d');
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
    }
    
    function resizeCanvas() {
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        drawEmptyCanvas();
    }
    
    function drawEmptyCanvas() {
        if (!ctx) return;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#1a1a2a';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, canvas.height / 2);
        ctx.lineTo(canvas.width, canvas.height / 2);
        ctx.stroke();
    }
    
    // ============================================================
    //  VISUALIZADOR
    // ============================================================
    function drawVisualizer(dataArray) {
        if (!ctx || !canvas) return;
        const w = canvas.width;
        const h = canvas.height;
        const mid = h / 2;
        
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, w, h);
        
        ctx.strokeStyle = '#1a1a2a';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, mid);
        ctx.lineTo(w, mid);
        ctx.stroke();
        
        ctx.strokeStyle = '#00e676';
        ctx.lineWidth = 1.5;
        ctx.shadowColor = 'rgba(0,230,118,0.1)';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        
        const step = Math.max(1, Math.floor(dataArray.length / w));
        const amp = h / 2 * 0.8;
        
        for (let i = 0; i < w; i++) {
            const idx = Math.floor(i * step);
            const val = dataArray[idx] || 0;
            const x = i;
            const y = mid + (val * amp);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
    }
    
    // ============================================================
    //  DETECÇÃO DE PITCH
    // ============================================================
    function autoCorrelate(buffer, sampleRate) {
        const size = buffer.length;
        let rms = 0;
        for (let i = 0; i < size; i++) {
            rms += buffer[i] * buffer[i];
        }
        rms = Math.sqrt(rms / size);
        if (rms < 0.01) return -1;
        
        let maxIdx = -1;
        let maxVal = -1;
        
        for (let i = 0; i < size / 2; i++) {
            let corr = 0;
            for (let j = 0; j < size - i; j++) {
                corr += buffer[j] * buffer[j + i];
            }
            if (corr > maxVal) {
                maxVal = corr;
                maxIdx = i;
            }
        }
        
        if (maxIdx > 0 && maxVal > 0.1) {
            return sampleRate / maxIdx;
        }
        return -1;
    }
    
    function freqToNote(freq) {
        if (freq < 50 || freq > 2000) return null;
        const a4 = 440;
        const c0 = a4 * Math.pow(2, -69/12);
        const noteNumber = Math.round(12 * Math.log2(freq / c0));
        const noteIndex = ((noteNumber % 12) + 12) % 12;
        return NOTAS[noteIndex];
    }
    
    function getNoteFreq(note) {
        return FREQ_NOTAS[note] || 0;
    }
    
    function getNoteIndex(note) {
        return NOTAS.indexOf(note);
    }
    
    // ============================================================
    //  PROCESSAMENTO PRINCIPAL
    // ============================================================
    function processAudio() {
        if (!analyser || !isRecording) return;
        
        const bufLen = analyser.fftSize;
        const dataArray = new Float32Array(bufLen);
        analyser.getFloatTimeDomainData(dataArray);
        
        drawVisualizer(dataArray);
        
        const freq = autoCorrelate(dataArray, audioCtx.sampleRate);
        const display = document.getElementById('display');
        const sub = document.getElementById('displaySub');
        const tunerBar = document.getElementById('tunerBar');
        const statusDot = document.getElementById('statusDot');
        const displayArea = document.getElementById('displayArea');
        
        if (freq > 50 && freq < 2000) {
            contadorSilencio = 0;
            const nota = freqToNote(freq);
            
            if (nota) {
                let displayText = nota;
                let subText = `${Math.round(freq)} Hz`;
                let displayClass = 'display';
                let isInTune = false;
                let isClose = false;
                
                // === AFINADOR ===
                if (modo === 'AFINADOR') {
                    const targetFreq = getNoteFreq(nota);
                    if (targetFreq > 0) {
                        const diff = ((freq - targetFreq) / targetFreq) * 100;
                        const diffPct = Math.abs(diff);
                        const barPct = Math.min(Math.max(diff * 2 + 50, 0), 100);
                        tunerBar.style.width = barPct + '%';
                        
                        if (diffPct < 0.5) {
                            tunerBar.style.background = '#00e676';
                            isInTune = true;
                            displayClass = 'display in-tune';
                            subText = `✅ Afinado! (${Math.round(freq)} Hz)`;
                        } else if (diffPct < 2) {
                            tunerBar.style.background = '#ffa726';
                            isClose = true;
                            displayClass = 'display close';
                            subText = diff < 0 ? `⬇️ Grave (${diffPct.toFixed(1)}%)` : `⬆️ Agudo (${diffPct.toFixed(1)}%)`;
                        } else {
                            tunerBar.style.background = '#ff1744';
                            displayClass = 'display wrong';
                            subText = diff < 0 ? '⬇️ Muito grave' : '⬆️ Muito agudo';
                        }
                        
                        if (isInTune || isClose) {
                            historico.push({
                                nota: nota,
                                modo: 'AFINADOR',
                                freq: Math.round(freq),
                                tempo: new Date().toLocaleTimeString(),
                                status: isInTune ? '✅' : '⚠️'
                            });
                            updateHistory();
                        }
                    }
                    
                    display.className = displayClass;
                    display.textContent = displayText;
                    sub.textContent = subText;
                    statusDot.className = 'status-dot ' + (isInTune ? 'detected' : 'recording');
                    document.getElementById('modeText').textContent = 'AFINADOR';
                    
                // === EXERCÍCIO ===
                } else if (modo === 'EXERCICIO' && exercicioAtivo && escalaAtual) {
                    const notaEsperada = escalaAtual.notas[indiceEscala];
                    const isCorrect = nota === notaEsperada;
                    
                    displayText = nota;
                    displayClass = isCorrect ? 'display in-tune' : 'display wrong';
                    subText = isCorrect ? `✅ Nota certa! (${indiceEscala + 1}/${escalaAtual.notas.length})` : 
                                         `❌ Era: ${notaEsperada}`;
                    
                    if (isCorrect) {
                        exercicioNotasAcertadas++;
                        const scaleNotes = document.querySelectorAll('.scale-note');
                        if (scaleNotes[indiceEscala]) {
                            scaleNotes[indiceEscala].classList.remove('current-target', 'wrong');
                            scaleNotes[indiceEscala].classList.add('correct');
                        }
                        indiceEscala++;
                        
                        if (indiceEscala >= escalaAtual.notas.length) {
                            const percentual = Math.round((exercicioNotasAcertadas / exercicioTotalNotas) * 100);
                            subText = `🎉 Exercício concluído! Acertos: ${exercicioNotasAcertadas}/${exercicioTotalNotas} (${percentual}%)`;
                            displayText = '✅';
                            exercicioAtivo = false;
                            document.getElementById('btnStartExercise').disabled = false;
                            document.getElementById('btnStartExercise').textContent = '🔄 Refazer';
                            document.getElementById('btnStopExercise').classList.remove('active');
                            document.getElementById('displayArea').className = 'display-area idle';
                            statusDot.className = 'status-dot idle';
                            
                            historico.push({
                                nota: 'EXERCÍCIO',
                                modo: 'EXERCÍCIO',
                                detalhe: `${escalaAtual.nome}: ${exercicioNotasAcertadas}/${exercicioTotalNotas}`,
                                tempo: new Date().toLocaleTimeString()
                            });
                            updateHistory();
                        } else {
                            const scaleNotes = document.querySelectorAll('.scale-note');
                            if (scaleNotes[indiceEscala]) {
                                scaleNotes[indiceEscala].classList.add('current-target');
                            }
                            // Toca a próxima nota como referência
                            const proxNota = escalaAtual.notas[indiceEscala];
                            const freqProx = getNoteFreq(proxNota);
                            if (freqProx > 0) {
                                setTimeout(() => playPianoNote(freqProx, 0.5, 0.5), 300);
                            }
                        }
                    } else {
                        const scaleNotes = document.querySelectorAll('.scale-note');
                        if (scaleNotes[indiceEscala]) {
                            scaleNotes[indiceEscala].classList.add('wrong');
                            setTimeout(() => {
                                scaleNotes[indiceEscala].classList.remove('wrong');
                            }, 500);
                        }
                    }
                    
                    display.className = displayClass;
                    display.textContent = displayText;
                    sub.textContent = subText;
                    statusDot.className = 'status-dot ' + (isCorrect ? 'detected' : 'recording');
                    document.getElementById('modeText').textContent = `EXERCÍCIO ${indiceEscala + 1}/${escalaAtual.notas.length}`;
                    
                    historico.push({
                        nota: nota,
                        modo: 'EXERCÍCIO',
                        esperado: notaEsperada,
                        correto: isCorrect,
                        tempo: new Date().toLocaleTimeString()
                    });
                    updateHistory();
                    
                // === MÚSICA ===
                } else if (modo === 'MUSICA' && musicaAtiva && musicaIndex < musicaAtual.length) {
                    const itemAtual = musicaAtual[musicaIndex];
                    const notaEsperada = itemAtual.chord || itemAtual.nota;
                    
                    if (notaEsperada) {
                        const isCorrect = nota === notaEsperada;
                        
                        if (isCorrect) {
                            musicaAcertos++;
                            displayClass = 'display in-tune';
                            subText = `✅ Nota certa! (${musicaIndex + 1}/${musicaAtual.length})`;
                            itemAtual.acertou = true;
                        } else {
                            musicaErros++;
                            displayClass = 'display wrong';
                            subText = `❌ Era: ${notaEsperada}`;
                            itemAtual.errou = true;
                        }
                        
                        displayText = nota;
                        display.className = displayClass;
                        display.textContent = displayText;
                        sub.textContent = subText;
                        statusDot.className = 'status-dot ' + (isCorrect ? 'detected' : 'recording');
                        document.getElementById('modeText').textContent = `MÚSICA ${musicaIndex + 1}/${musicaAtual.length}`;
                        
                        // Atualiza barra de progresso
                        const progress = ((musicaIndex + 1) / musicaAtual.length) * 100;
                        document.getElementById('musicProgressBar').style.width = progress + '%';
                        
                        musicaIndex++;
                        
                        if (musicaIndex >= musicaAtual.length) {
                            const percentual = Math.round((musicaAcertos / (musicaAcertos + musicaErros)) * 100);
                            subText = `🎤 Música concluída! Acertos: ${musicaAcertos}, Erros: ${musicaErros} (${percentual}%)`;
                            displayText = '🎉';
                            musicaAtiva = false;
                            document.getElementById('btnStartMusic').disabled = false;
                            document.getElementById('btnStartMusic').textContent = '🔄 Refazer';
                            document.getElementById('btnStopMusic').classList.remove('active');
                            document.getElementById('displayArea').className = 'display-area idle';
                            statusDot.className = 'status-dot idle';
                            document.getElementById('musicProgress').classList.remove('active');
                            
                            historico.push({
                                nota: 'MÚSICA',
                                modo: 'MÚSICA',
                                detalhe: `Acertos: ${musicaAcertos}, Erros: ${musicaErros}`,
                                tempo: new Date().toLocaleTimeString()
                            });
                            updateHistory();
                        } else {
                            // Toca próxima nota como referência
                            const proxItem = musicaAtual[musicaIndex];
                            if (proxItem.chord) {
                                const freqProx = getNoteFreq(proxItem.chord);
                                if (freqProx > 0) {
                                    setTimeout(() => playPianoNote(freqProx, 0.4, 0.4), 400);
                                }
                            }
                        }
                    }
                } else {
                    display.className = 'display idle';
                    display.textContent = '---';
                    sub.textContent = 'Aguardando...';
                    statusDot.className = 'status-dot recording';
                }
                
                displayArea.className = 'display-area recording';
                
            } else {
                tunerBar.style.width = '50%';
                tunerBar.style.background = '#444';
                display.textContent = '---';
                display.className = 'display idle';
                sub.textContent = 'Sinal detectado';
                statusDot.className = 'status-dot recording';
            }
        } else {
            contadorSilencio++;
            if (contadorSilencio > 10) {
                tunerBar.style.width = '50%';
                tunerBar.style.background = '#444';
                if (!exercicioAtivo && !musicaAtiva) {
                    display.textContent = '---';
                    display.className = 'display idle';
                    sub.textContent = contadorSilencio > 30 ? 'Aguardando sinal...' : 'Toque ou cante...';
                    statusDot.className = 'status-dot recording';
                    displayArea.className = 'display-area';
                }
                ultimaNota = '';
            }
        }
        
        animId = requestAnimationFrame(processAudio);
    }
    
    // ============================================================
    //  CONTROLES
    // ============================================================
    async function iniciar() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, noiseSuppression: false } 
            });
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 4096;
            analyser.smoothingTimeConstant = 0.7;
            
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            
            isRecording = true;
            const btn = document.getElementById('btnRecord');
            btn.disabled = true;
            btn.textContent = '🔴 Gravando...';
            btn.classList.add('recording');
            
            document.getElementById('btnExport').disabled = false;
            document.getElementById('btnExport').classList.add('active');
            document.getElementById('displayArea').className = 'display-area recording';
            document.getElementById('statusDot').className = 'status-dot recording';
            document.getElementById('modeText').textContent = 'ESCUTANDO...';
            
            initPiano();
            processAudio();
            
        } catch (err) {
            alert('Erro ao acessar microfone: ' + err.message);
        }
    }
    
    function parar() {
        isRecording = false;
        if (animId) {
            cancelAnimationFrame(animId);
            animId = null;
        }
        if (stream) {
            stream.getTracks().forEach(t => t.stop());
            stream = null;
        }
        if (audioCtx && audioCtx.state !== 'closed') {
            audioCtx.close();
            audioCtx = null;
        }
        
        const btn = document.getElementById('btnRecord');
        btn.disabled = false;
        btn.textContent = '🎤 Iniciar';
        btn.classList.remove('recording');
        
        document.getElementById('btnExport').classList.remove('active');
        document.getElementById('displayArea').className = 'display-area idle';
        document.getElementById('statusDot').className = 'status-dot idle';
        document.getElementById('modeText').textContent = 'PRONTO';
        document.getElementById('display').textContent = '---';
        document.getElementById('display').className = 'display idle';
        document.getElementById('displaySub').textContent = 'Toque ou cante para começar';
        document.getElementById('tunerBar').style.width = '50%';
        document.getElementById('tunerBar').style.background = '#444';
        drawEmptyCanvas();
        
        // Para exercícios e música
        if (playInterval) {
            clearInterval(playInterval);
            playInterval = null;
        }
        exercicioAtivo = false;
        musicaAtiva = false;
        document.getElementById('musicProgress').classList.remove('active');
        document.getElementById('btnStopExercise').classList.remove('active');
        document.getElementById('btnStopMusic').classList.remove('active');
    }

    function playExercise() {
        const select = document.getElementById('exerciseSelect');
        const key = select.value;
        const escala = ESCALAS[key];
        if (!escala) return;
        
        const btn = document.getElementById('btnPlayExercise');
        if (isPlayingExercise) {
            clearInterval(playInterval);
            playInterval = null;
            isPlayingExercise = false;
            btn.textContent = '▶ Tocar';

            document.querySelectorAll('.scale-note').forEach(el => el.classList.remove('played'));
            return;
        }
        
        isPlayingExercise = true;
        btn.textContent = '⏹ Parar';
        btn.classList.add('playing');
        
        // Mostrar a escala
        const scaleDisplay = document.getElementById('scaleDisplay');

            const div = document.createElement('div');
            div.className = 'scale-note';
            div.textContent = nota;
            scaleDisplay.appendChild(div);
        });
        
        // Tocar todas as notas com piano

            isPlayingExercise = false;
            btn.textContent = '▶ Tocar';
            btn.classList.remove('playing');

    // ============================================================
    //  MÚSICA
    // ============================================================
    function loadMusic() {
        const input = document.getElementById('musicInput');
        const text = input.value;
        if (!text.trim()) {
            alert('Cole a música com cifras!');
            return;
        }
        
        // Processa a música
        const lines = text.split('\n').filter(l => l.trim());
        musicaAtual = [];
        
        lines.forEach(line => {
            const parts = line.split(/(\[[^\]]+\])/);
            let currentChord = null;
            
            parts.forEach(part => {
                if (part.match(/^\[.+\]$/)) {
                    currentChord = part.replace(/[\[\]]/g, '');
                } else if (part.trim()) {
                    const words = part.trim().split(/\s+/);
                    words.forEach(word => {
                        if (word) {
                            musicaAtual.push({
                                word: word,
                                chord: currentChord,
                                nota: currentChord,
                                acertou: false,
                                errou: false
                            });
                        }
                    });
                }
            });
        });
        
        if (musicaAtual.length === 0) {
            alert('Nenhuma palavra com cifra encontrada!');
            return;
        }
        
        document.getElementById('btnStartMusic').disabled = false;
        document.getElementById('btnStartMusic').textContent = '🎤 Começar';
        document.getElementById('displaySub').textContent = `📥 ${musicaAtual.length} palavras carregadas`;
        input.placeholder = `✅ ${musicaAtual.length} palavras carregadas!`;
        document.getElementById('musicProgressBar').style.width = '0%';
        
        // Mostra preview
        let preview = '';
        musicaAtual.slice(0, 10).forEach(item => {
            if (item.chord) preview += `[${item.chord}] `;
            preview += `${item.word} `;
        });
        if (musicaAtual.length > 10) preview += '...';
        document.getElementById('display').textContent = '📝';
        document.getElementById('display').className = 'display music';
        document.getElementById('displaySub').textContent = preview;
    }
    
    function startMusic() {
        if (musicaAtual.length === 0) {
            alert('Carregue uma música primeiro!');
            return;
        }
        
        musicaAtiva = true;
        musicaIndex = 0;
        musicaAcertos = 0;
        musicaErros = 0;
        musicaTocadas = [];
        
        document.getElementById('btnStartMusic').disabled = true;
        document.getElementById('btnStartMusic').textContent = '🎤 Cantando...';
        document.getElementById('btnStopMusic').classList.add('active');
        document.getElementById('displayArea').className = 'display-area music';
        document.getElementById('statusDot').className = 'status-dot music';
        document.getElementById('modeText').textContent = 'CANTANDO...';
        document.getElementById('display').textContent = '🎤';
        document.getElementById('display').className = 'display music';
        document.getElementById('displaySub').textContent = `Vamos começar! (1/${musicaAtual.length})`;
        document.getElementById('musicProgress').classList.add('active');
        document.getElementById('musicProgressBar').style.width = '0%';
        
        // Mostra primeira nota
        const primeira = musicaAtual[0];
        if (primeira.chord) {
            setTimeout(() => {
                const freq = getNoteFreq(primeira.chord);
                if (freq > 0) playPianoNote(freq, 0.6, 0.5);
                document.getElementById('displaySub').textContent = `🎵 Cante: ${primeira.chord}`;
            }, 500);
        }
    }
    
    function stopMusic() {
        musicaAtiva = false;
        document.getElementById('btnStartMusic').disabled = false;
        document.getElementById('btnStartMusic').textContent = '🎤 Começar';
        document.getElementById('btnStopMusic').classList.remove('active');
        document.getElementById('displayArea').className = 'display-area idle';
        document.getElementById('statusDot').className = 'status-dot idle';
        document.getElementById('modeText').textContent = 'MÚSICA';
        document.getElementById('display').textContent = '⏹';
        document.getElementById('display').className = 'display idle';
        document.getElementById('displaySub').textContent = 'Música interrompida';
        document.getElementById('musicProgress').classList.remove('active');
        
        if (playInterval) {
            clearInterval(playInterval);
            playInterval = null;
        }
    }
    
    // ============================================================
    //  HISTÓRICO
    // ============================================================
    function updateHistory() {
        const container = document.getElementById('historyContainer');
        container.innerHTML = '';
        
        if (historico.length === 0) {
            container.innerHTML = '<div class="history-empty">Histórico de notas</div>';
            return;
        }
        
        const recent = historico.slice(-20);
        recent.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            if (i === recent.length - 1) div.classList.add('current');
            if (item.correto === false) div.classList.add('wrong');
            if (item.modo === 'MÚSICA') div.classList.add('music');
            
            let label = item.nota || '---';
            if (item.modo === 'EXERCÍCIO' && item.esperado) {
                label = `${item.nota}/${item.esperado}`;
            }
            if (item.modo === 'MÚSICA' && item.nota === 'MÚSICA') {
                label = '🎤';
            }
            div.textContent = `${label} ${item.tempo || ''}`;
            container.appendChild(div);
        });
    }
    
    // ============================================================
    //  EXPORTAR PDF
    // ============================================================
    function exportPDF() {
        if (historico.length === 0) {
            alert('Nenhuma nota detectada para exportar.');
            return;
        }
        
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(18);
            doc.setTextColor(0, 230, 118);
            doc.text('Max Ear AI Pro', 20, 25);
            
            doc.setFontSize(11);
            doc.setTextColor(200, 200, 200);
            doc.text(`Modo: ${modo}`, 20, 38);
            doc.text(`Data: ${new Date().toLocaleString()}`, 20, 46);
            doc.text(`Total: ${historico.length} registros`, 20, 54);
            
            // Música carregada
            if (musicaAtual.length > 0) {
                doc.text('--- MÚSICA CARREGADA ---', 20, 68);
                let y = 76;
                musicaAtual.forEach((item) => {
                    if (y > 270) { doc.addPage(); y = 20; }
                    let text = '';
                    if (item.chord) text += `[${item.chord}] `;
                    text += item.word;
                    if (item.acertou) text += ' ✅';
                    if (item.errou) text += ' ❌';
                    doc.setFontSize(7);
                    doc.text(text, 20, y);
                    y += 4;
                });
            }
            
            let y = 90;
            doc.setFontSize(7);
            
            // Histórico detalhado
            historico.forEach((item, i) => {
                if (y > 270) { doc.addPage(); y = 20; }
                let text = `${i+1}. `;
                if (item.modo === 'AFINADOR') {
                    text += `${item.nota} - ${item.freq}Hz - ${item.status || ''}`;
                } else if (item.modo === 'EXERCÍCIO') {
                    text += `Exercício: ${item.nota} → ${item.esperado || ''} ${item.correto ? '✅' : '❌'}`;
                } else if (item.modo === 'MÚSICA') {
                    text += `Música: ${item.nota} - ${item.detalhe || ''}`;
                } else {
                    text += `${item.nota} - ${item.detalhe || ''}`;
                }
                text += ` (${item.tempo})`;
                doc.text(text, 20, y);
                y += 4;
            });
            
            doc.save('max-ear-report.pdf');
            
        } catch (err) {
            alert('Erro ao gerar PDF: ' + err.message);
        }
    }
    
    // ============================================================
    //  EVENT LISTENERS
    // ============================================================
    window.addEventListener('load', () => {
        initCanvas();
        drawEmptyCanvas();
        initPiano();
        
        document.getElementById('btnRecord').onclick = () => {
            if (isRecording) parar();
            else iniciar();
        };
        
        document.getElementById('btnExport').onclick = exportPDF;
    });
    
    window.addEventListener('beforeunload', () => {
        if (isRecording) parar();
        if (playInterval) clearInterval(playInterval);
        if (pianoCtx && pianoCtx.state !== 'closed') {
            pianoCtx.close();
        }
    });
</script>
</body>
</html>
