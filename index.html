            <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Max Ear Pro - Corrigido</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #161616; padding: 20px; border-radius: 20px; width: 95%; max-width: 400px; text-align: center; border: 1px solid #333; }
        canvas { width: 100%; height: 100px; background: #000; border-radius: 10px; margin-bottom: 10px; border: 1px solid #00e676; }
        .display { font-size: 2rem; color: #00e676; margin: 10px 0; font-weight: bold; height: 50px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        button { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 0.75rem; }
        .active { background: #00e676 !important; color: #000; }
    </style>
</head>
<body>

<div class="container">
    <canvas id="visualizer"></canvas>
    <div id="display" class="display">---</div>
    <div class="btn-grid">
        <button class="mode-btn" onclick="setModo('AFINADOR', this)">AFINADOR</button>
        <button class="mode-btn" onclick="setModo('ACORDES', this)">ACORDES</button>
        <button class="mode-btn" onclick="setModo('MELODIA', this)">MELODIA</button>
    </div>
    <button id="btnRecord" style="width:100%; background:#00e676; padding:15px;">INICIAR MICROFONE</button>
    <button id="btnStop" style="width:100%; margin-top:5px; background:#d32f2f; padding:15px;" disabled>PARAR E SALVAR PDF</button>
</div>

<script>
    let audioCtx, analyser, modoAtual = 'AFINADOR', historico = [], buffer = [];
    const canvas = document.getElementById('visualizer'), ctx = canvas.getContext('2d');
    const notasRef = ["Dó", "Dó#", "Ré", "Ré#", "Mi", "Fá", "Fá#", "Sol", "Sol#", "Lá", "Lá#", "Si"];
    
    // Dicionário expandido para maior precisão
    const acordes = {
        "C": ["Dó", "Mi", "Sol"],
        "Dm": ["Ré", "Fá", "Lá"],
        "Em": ["Mi", "Sol", "Si"],
        "F": ["Fá", "Lá", "Dó"],
        "G": ["Sol", "Si", "Ré"],
        "Am": ["Lá", "Dó", "Mi"]
    };

    function setModo(m, btn) {
        modoAtual = m;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        buffer = [];
    }

    async function capturar() {
        requestAnimationFrame(capturar);
        let data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteTimeDomainData(data);
        
        // Desenhar onda
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = '#00e676'; ctx.beginPath();
        for(let i=0; i<data.length; i++) ctx.lineTo(i/data.length*canvas.width, data[i]/256*canvas.height);
        ctx.stroke();

        // Análise de Pitch Simples
        let freq = 0; // Nota: Em um app real, aqui entraria um algoritmo de autocorrelação (YIN)
        // Para simplificar o A1, pegamos o pico do volume
        let nota = notasRef[Math.floor(Math.random() * 12)]; // Placeholder lógico para o pitch

        if(modoAtual === 'MELODIA') {
            buffer.push(nota);
            if(buffer.length > 10) {
                let novaNota = buffer[buffer.length-1];
                if(novaNota !== document.getElementById('display').innerText) {
                    document.getElementById('display').innerText = novaNota;
                    historico.push({tipo:'Melodia', valor: novaNota});
                }
                buffer = [];
            }
        } 
        else if(modoAtual === 'ACORDES') {
            buffer.push(nota);
            if(buffer.length > 20) {
                let unique = [...new Set(buffer)];
                for(let nome in acordes) {
                    if(acordes[nome].every(n => unique.includes(n))) {
                        document.getElementById('display').innerText = nome;
                        historico.push({tipo:'Acorde', valor: nome});
                    }
                }
                buffer = [];
            }
        }
    }

    document.getElementById('btnRecord').onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        audioCtx = new AudioContext(); analyser = audioCtx.createAnalyser();
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        document.getElementById('btnStop').disabled = false;
        capturar();
    };

    document.getElementById('btnStop').onclick = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        historico.forEach((h,i) => doc.text(`${i+1}. ${h.tipo}: ${h.valor}`, 20, 20+(i*10)));
        doc.save("Relatorio.pdf");
        location.reload();
    };
</script>
</body>
</html>
