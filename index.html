<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ear Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { touch-action: manipulation; box-sizing: border-box; }
        body { 
            background: #050505; color: #fff; font-family: 'Helvetica Neue', sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; 
        }
        .container { 
            width: 100%; max-width: 400px; height: 100%; background: #111; 
            display: flex; flex-direction: column; padding: 20px; gap: 15px;
        }
        canvas { width: 100%; height: 120px; background: #000; border: 1px solid #222; border-radius: 12px; }
        .display-area { 
            background: #1a1a1a; padding: 20px; border-radius: 15px; text-align: center;
            border-bottom: 3px solid #00e676;
        }
        .display { font-size: 2.5rem; color: #00e676; font-weight: 800; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        button { 
            padding: 15px 5px; border-radius: 12px; border: none; font-weight: 600; 
            background: #222; color: #fff; cursor: pointer; transition: 0.2s;
        }
        button.active { background: #00e676; color: #000; }
        .main-controls { display: flex; flex-direction: column; gap: 10px; margin-top: auto; }
        #btnRecord { background: #00e676; color: #000; padding: 20px; font-size: 1.1rem; }
        #btnStop { background: #333; color: #fff; padding: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; font-weight: bold; letter-spacing: 2px;">MAX EAR STUDIO</div>
    <canvas id="visualizer"></canvas>
    
    <div class="display-area">
        <div id="display" class="display">---</div>
    </div>

    <div class="btn-grid">
        <button class="mode-btn" onclick="setModo('AFINADOR', this)">AFINADOR</button>
        <button class="mode-btn" onclick="setModo('ACORDES', this)">ACORDES</button>
        <button class="mode-btn" onclick="setModo('MELODIA', this)">MELODIA</button>
    </div>

    <div class="main-controls">
        <button id="btnRecord">INICIAR MONITORAMENTO</button>
        <button id="btnStop" disabled>PARAR E EXPORTAR PDF</button>
    </div>
</div>

<script>
    let audioCtx, analyser, modoAtual = 'AFINADOR', buffer = [];
    const canvas = document.getElementById('visualizer'), ctx = canvas.getContext('2d');
    const notasRef = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    function setModo(m, btn) {
        modoAtual = m;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        buffer = [];
        document.getElementById('display').innerText = m;
    }

    function getPitch(data) {
        let count = 0;
        for (let i = 0; i < data.length - 1; i++) {
            if (data[i] < 0 && data[i + 1] >= 0) count++;
        }
        return (count * 44100) / data.length;
    }

    function render() {
        let data = new Float32Array(2048);
        analyser.getFloatTimeDomainData(data);
        
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = '#00e676'; ctx.beginPath();
        for(let i=0; i<data.length; i++) ctx.lineTo(i/data.length*canvas.width, (data[i]*0.5+0.5)*canvas.height);
        ctx.stroke();

        let hz = getPitch(data);
        if (hz > 50 && hz < 2000) {
            let n = Math.round(12 * (Math.log(hz / 440) / Math.log(2)) + 69);
            let nota = notasRef[n % 12];
            document.getElementById('display').innerText = nota;
        }
        if(!document.getElementById('btnStop').disabled) requestAnimationFrame(render);
    }

    document.getElementById('btnRecord').onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        audioCtx = new AudioContext(); analyser = audioCtx.createAnalyser();
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        document.getElementById('btnStop').disabled = false;
        render();
    };

    document.getElementById('btnStop').onclick = () => location.reload();
</script>
</body>
</html>
