<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max Ear AI Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { 
            --accent: #00e676; 
            --bg: #050505;
            --card-bg: #111;
        }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        .container { 
            flex: 1; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        canvas { 
            width: 100%; 
            height: 120px; 
            background: #000; 
            border: 1px solid #222; 
            border-radius: 12px; 
            display: block;
        }
        .display-area { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            border: 1px solid var(--accent);
            transition: all 0.3s ease;
        }
        .display-area.active { border-color: #ff6b6b; }
        .mode-label { 
            font-size: 0.7rem; 
            color: #888; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .display { 
            font-size: 2.8rem; 
            color: var(--accent); 
            font-weight: 800; 
            margin-top: 5px;
            font-family: 'Courier New', monospace;
        }
        .display-sub {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 4px;
            min-height: 20px;
        }
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 8px; 
        }
        button { 
            padding: 12px; 
            border-radius: 8px; 
            border: none; 
            font-weight: 600; 
            background: #222; 
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }
        button:active { transform: scale(0.95); }
        button.active { 
            background: var(--accent); 
            color: #000; 
            box-shadow: 0 0 20px rgba(0,230,118,0.3);
        }
        .footer { 
            display: flex; 
            gap: 10px; 
            padding: 15px; 
            background: var(--card-bg); 
            border-top: 1px solid #333;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        #btnRecord { 
            flex: 2; 
            background: var(--accent); 
            color: #000; 
            font-weight: bold; 
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
        }
        #btnRecord:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #btnStop { 
            flex: 1; 
            background: #d32f2f; 
            color: #fff; 
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }
        #btnStop:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }
        .status-indicator.recording { background: #ff6b6b; animation: pulse 1s infinite; }
        .status-indicator.idle { background: #888; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .history {
            max-height: 80px;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 8px;
            background: #0a0a0a;
            border-radius: 8px;
            margin-top: 8px;
            border: 1px solid #222;
        }
        .history-item {
            background: #1a1a1a;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            color: #aaa;
        }
        .history-item.current { color: var(--accent); font-weight: bold; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <canvas id="visualizer"></canvas>
    <div class="display-area" id="displayArea">
        <div class="mode-label" id="label">🎵 Aguardando...</div>
        <div id="display" class="display">---</div>
        <div id="displaySub" class="display-sub">Toque uma nota</div>
    </div>
    <div class="grid">
        <button onclick="setModo('AFINADOR', this)" class="active">🎯 Afinador</button>
        <button onclick="setModo('ACORDES', this)">🎹 Acordes</button>
        <button onclick="setModo('MELODIA', this)">🎵 Melodia</button>
    </div>
    <div id="historyContainer" class="history"></div>
</div>

<div class="footer">
    <button id="btnRecord">🎤 Iniciar IA</button>
    <button id="btnStop" disabled>📄 Exportar PDF</button>
</div>

<script>
    let audioCtx, analyser, modo = 'AFINADOR', historico = [], canvas, ctx;
    let isRecording = false, animationFrame;
    const notas = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    
    // Inicialização do canvas
    canvas = document.getElementById('visualizer');
    ctx = canvas.getContext('2d');
    
    // Função para desenhar o visualizador
    function drawVisualizer(buffer) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const width = canvas.width;
        const height = canvas.height;
        const barWidth = width / buffer.length;
        const middle = height / 2;
        
        ctx.strokeStyle = '#00e676';
        ctx.lineWidth = 2;
        ctx.beginPath();
        
        for (let i = 0; i < buffer.length; i++) {
            const x = i * barWidth;
            const y = middle + (buffer[i] * middle);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
        
        // Adicionar gradiente
        const gradient = ctx.createLinearGradient(0, 0, 0, height);
        gradient.addColorStop(0, 'rgba(0,230,118,0.1)');
        gradient.addColorStop(0.5, 'rgba(0,230,118,0.05)');
        gradient.addColorStop(1, 'rgba(0,230,118,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);
    }

    // Algoritmo de Autocorrelação melhorado
    function autoCorrelate(buf, sampleRate) {
        let SIZE = buf.length;
        let rms = 0;
        for(let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
        rms = Math.sqrt(rms/SIZE);
        if(rms < 0.01) return -1;
        
        let r1 = 0, r2 = SIZE - 1;
        const threshold = 0.2;
        
        for(let i = 0; i < SIZE/2; i++) {
            if(Math.abs(buf[i]) < threshold) { r1 = i; break; }
        }
        for(let i = 1; i < SIZE/2; i++) {
            if(Math.abs(buf[SIZE - i]) < threshold) { r2 = SIZE - i; break; }
        }
        
        buf = buf.slice(r1, r2);
        SIZE = buf.length;
        let c = new Array(SIZE).fill(0);
        
        for(let i = 0; i < SIZE; i++) {
            for(let j = 0; j < SIZE - i; j++) {
                c[i] += buf[j] * buf[j + i];
            }
        }
        
        let d = 0;
        while(d < SIZE - 1 && c[d] > c[d + 1]) d++;
        if(d >= SIZE - 1) return -1;
        
        let maxval = -1, maxpos = -1;
        for(let i = d; i < SIZE; i++) {
            if(c[i] > maxval) {
                maxval = c[i];
                maxpos = i;
            }
        }
        
        if(maxpos > 0) {
            let freq = sampleRate / maxpos;
            return freq;
        }
        return -1;
    }

    // Função para identificar acordes
    function detectChord(nota) {
        const acordes = {
            'C': ['C', 'E', 'G'],
            'D': ['D', 'F#', 'A'],
            'E': ['E', 'G#', 'B'],
            'F': ['F', 'A', 'C'],
            'G': ['G', 'B', 'D'],
            'A': ['A', 'C#', 'E'],
            'B': ['B', 'D#', 'F#']
        };
        return acordes[nota] || null;
    }

    // Configuração de Estúdio
    async function iniciar() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({audio: true});
            audioCtx = new AudioContext({sampleRate: 44100});
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 4096;
            analyser.smoothingTimeConstant = 0.8;
            
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            
            isRecording = true;
            document.getElementById('btnRecord').disabled = true;
            document.getElementById('btnRecord').innerHTML = '🔴 Gravando...';
            document.getElementById('btnStop').disabled = false;
            document.getElementById('displayArea').classList.add('active');
            document.getElementById('label').innerHTML = '🎙️ Escutando...';
            
            loop();
        } catch (err) {
            alert('Erro ao acessar o microfone: ' + err.message);
        }
    }

    function loop() {
        if (!isRecording) return;
        
        let buffer = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buffer);
        
        // Desenhar visualizador
        drawVisualizer(buffer);
        
        let pitch = autoCorrelate(buffer, audioCtx.sampleRate);
        let displayText = '---';
        let subText = 'Aguardando sinal...';
        
        if (pitch > 50 && pitch < 2000) {
            let n = Math.round(12 * (Math.log(pitch / 440) / Math.log(2)) + 69);
            n = ((n % 12) + 12) % 12;
            let nota = notas[n];
            
            if (modo === 'AFINADOR') {
                displayText = nota;
                subText = `Frequência: ${Math.round(pitch)}Hz`;
                
                // Adicionar ao histórico
                historico.push({nota, tempo: new Date().toLocaleTimeString()});
                updateHistory();
                
            } else if (modo === 'ACORDES') {
                const acorde = detectChord(nota);
                if (acorde) {
                    displayText = acorde.join(' - ');
                    subText = `Acorde ${nota} maior`;
                }
            } else if (modo === 'MELODIA') {
                displayText = nota;
                subText = `Nota detectada`;
            }
            
            document.getElementById('display').innerText = displayText;
            document.getElementById('displaySub').innerText = subText;
        } else {
            document.getElementById('display').innerText = '---';
            if (pitch < 0) {
                document.getElementById('displaySub').innerText = 'Sinal muito baixo...';
            }
        }
        
        animationFrame = requestAnimationFrame(loop);
    }

    function updateHistory() {
        const container = document.getElementById('historyContainer');
        container.innerHTML = '';
        const recent = historico.slice(-15);
        recent.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            if (index === recent.length - 1) div.classList.add('current');
            div.textContent = `${item.nota} ${item.tempo}`;
            container.appendChild(div);
        });
    }

    function setModo(m, btn) {
        modo = m;
        document.querySelectorAll('.grid button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('label').innerHTML = `🎵 Modo: ${m}`;
        historico = [];
        updateHistory();
        document.getElementById('display').innerText = '---';
        document.getElementById('displaySub').innerText = 'Modo alterado';
    }

    // Exportar PDF
    function exportarPDF() {
        if (historico.length === 0) {
            alert('Nenhuma nota detectada para exportar.');
            return;
        }
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(16);
        doc.text('Max Ear AI Pro - Relatório', 20, 20);
        doc.setFontSize(12);
        doc.text(`Modo: ${modo}`, 20, 30);
        doc.text(`Data: ${new Date().toLocaleString()}`, 20, 38);
        doc.text(`Total de notas: ${historico.length}`, 20, 46);
        
        let y = 60;
        doc.setFontSize(10);
        historico.forEach((item, index) => {
            if (y > 270) {
                doc.addPage();
                y = 20;
            }
            doc.text(`${index+1}. ${item.nota} - ${item.tempo}`, 20, y);
            y += 8;
        });
        
        doc.save('max-ear-report.pdf');
    }

    // Event Listeners
    document.getElementById('btnRecord').onclick = iniciar;
    document.getElementById('btnStop').onclick = () => {
        if (isRecording) {
            isRecording = false;
            cancelAnimationFrame(animationFrame);
            if (audioCtx) audioCtx.close();
            document.getElementById('btnRecord').disabled = false;
            document.getElementById('btnRecord').innerHTML = '🎤 Iniciar IA';
            document.getElementById('btnStop').disabled = true;
            document.getElementById('displayArea').classList.remove('active');
            document.getElementById('label').innerHTML = '⏸️ Pausado';
        } else {
            exportarPDF();
        }
    };

    // Ajuste de tamanho do canvas
    function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * window.devicePixelRatio;
        canvas.height = rect.height * window.devicePixelRatio;
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }
    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 100);
</script>
</body>
</html>
